<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Admission - Vrundavandham</title>
    <style>
        :root { --primary: #0e1e60; --secondary: #a31d24; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .info-title { width: 100%; max-width: 900px; color: var(--primary); font-size: 20px; font-weight: 700; margin: 20px 0 10px 0; border-left: 5px solid var(--secondary); padding-left: 10px; text-align: left; }
        .pdf-box { width: 100%; max-width: 900px; height: 450px; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 20px; background: white; }
        .show-form-btn { width: 100%; max-width: 900px; padding: 20px; background: var(--secondary); color: white; border: none; border-radius: 50px; font-size: 22px; font-weight: 800; cursor: pointer; margin: 20px 0; box-shadow: 0 8px 20px rgba(163, 29, 36, 0.3); transition: 0.3s; }
        #formSection { display: none; width: 100%; max-width: 900px; background: #fff; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); border: 1px solid #e2e8f0; overflow: hidden; animation: fadeIn 0.5s; margin-bottom: 50px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .header-img { width: 100%; height: auto; display: block; border-bottom: 4px solid var(--secondary); }
        .p-content { padding: 30px; }
        .section-bar { background: var(--primary); color: white; padding: 12px; border-radius: 8px; margin: 25px 0 15px 0; font-weight: 600; text-align: left; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; text-align: left; }
        .field { display: flex; flex-direction: column; }
        label { font-size: 14px; font-weight: 700; color: #475569; margin-bottom: 5px; }
        input, select, textarea { padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 15px; }
        .photo-area { grid-column: span 1; display: flex; flex-direction: column; align-items: center; background: #f1f5f9; padding: 15px; border-radius: 12px; border: 2px dashed #cbd5e1; }
        #preview { width: 110px; height: 130px; background: #fff; border: 1px solid #ddd; border-radius: 6px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; overflow: hidden; font-size: 12px; color: #94a3b8; }
        #preview img { width: 100%; height: 100%; object-fit: cover; }
        .btn-submit { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 20px; font-weight: 800; cursor: pointer; margin-top: 30px; }
        .span-2 { grid-column: span 2; } .span-3 { grid-column: span 3; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } .span-2, .span-3 { grid-column: span 1; } }
    </style>
</head>
<body>
    <div class="info-title">૧. એડમિશન માહિતી</div>
    <iframe src="Fees.pdf" class="pdf-box"></iframe>
    <div class="info-title">૨. VSGK માહિતી પત્રક</div>
    <iframe src="VSGK.pdf" class="pdf-box"></iframe>

    <button class="show-form-btn" onclick="toggleForm()">સ્કૂલ પ્રવેશ ફોર્મ ભરવા માટે અહીં ક્લિક કરો</button>

    <div id="formSection">
        <img src="header.jpeg" class="header-img">
        <div class="p-content">
            <h2 style="color:var(--secondary); text-align: center; margin-bottom: 25px;">શૈક્ષણિક પ્રવેશ ફોર્મ</h2>
            
            <form id="admissionForm">
                <div class="grid">
                    <div class="photo-area">
                        <div id="preview">વિદ્યાર્થી ફોટો</div>
                        <input type="file" accept="image/*" onchange="loadFile(event)" style="width:100%; font-size:10px;">
                    </div>
                    <div class="field span-2">
                        <label>વિદ્યાર્થીનું પૂરું નામ (અટક-નામ-પિતાનું નામ)</label>
                        <input type="text" name="studentName" placeholder="પૂરું નામ અહીં લખો" required>
                    </div>
                </div>

                <div class="section-bar">૧. પ્રવેશ અને શૈક્ષણિક વિગત</div>
                <div class="grid">
                    <div class="field"><label>ધોરણ</label><input type="text" name="grade" required></div>
                    <div class="field">
                        <label>લિંગ (Gender)</label>
                        <select name="gender" required>
                            <option value="">પસંદ કરો</option>
                            <option value="Male">કુમાર (Male)</option>
                            <option value="Female">કન્યા (Female)</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>જ્ઞાતિ (Caste)</label>
                        <select name="caste">
                            <option value="Open">Open</option>
                            <option value="Baxi">Baxi</option>
                            <option value="SC">SC</option>
                            <option value="ST">ST</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>પ્રકાર</label>
                        <select name="type">
                            <option value="Local">Local</option>
                            <option value="Up-Down">Up-Down</option>
                        </select>
                    </div>
                    <div class="field"><label>જન્મ તારીખ</label><input type="date" name="dob" required></div>
                    <div class="field span-2"><label>આધાર કાર્ડ નંબર</label><input type="text" name="aadhar" maxlength="12" pattern="\d{12}" placeholder="૧૨ આંકડાનો નંબર"></div>
                </div>

                <div class="section-bar">૨. વાલીની વિગત</div>
                <div class="grid">
                    <div class="field span-2"><label>પિતાનું પૂરું નામ</label><input type="text" name="fatherName" required></div>
                    <div class="field">
                        <label>મોબાઈલ નંબર</label>
                        <input type="tel" name="mobile" maxlength="10" pattern="[0-9]{10}" placeholder="૧૦ આંકડાનો નંબર" required>
                    </div>
                    <div class="field span-3"><label>સરનામું</label><textarea name="address" rows="3" placeholder="ગામ, તાલુકો, જિલ્લો"></textarea></div>
                </div>

                <button type="submit" id="submitBtn" class="btn-submit">સબમિટ કરો</button>
            </form>
        </div>
    </div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyauyu_OnhiGEhpoWZovKjOQ59eFmN07PGKOrghWPwOgESI600J5uOXcg9FsO79wGRl/exec';
    const form = document.getElementById('admissionForm');
    const submitBtn = document.getElementById('submitBtn');

    function toggleForm() { 
        var f = document.getElementById('formSection'); 
        f.style.display = 'block'; 
        f.scrollIntoView({ behavior: 'smooth' }); 
    }

    function loadFile(e) { 
        if(e.target.files[0]) { 
            document.getElementById('preview').innerHTML = '<img src="' + URL.createObjectURL(e.target.files[0]) + '">'; 
        } 
    }

    form.addEventListener('submit', e => {
        e.preventDefault();
        submitBtn.disabled = true;
        submitBtn.innerHTML = "ફોર્મ સબમિટ થઈ રહ્યું છે...";
        
        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                alert('અભિનંદન! એડમિશન ફોર્મ સફળતાપૂર્વક સબમિટ થઈ ગયું છે અને ડેટા એક્સલ શીટમાં સેવ થયો છે.');
                submitBtn.disabled = false;
                submitBtn.innerHTML = "સબમિટ કરો";
                form.reset();
                document.getElementById('preview').innerHTML = "વિદ્યાર્થી ફોટો";
                document.getElementById('formSection').style.display = 'none';
                window.scrollTo(0,0);
            })
            .catch(error => {
                console.error('Error!', error.message);
                alert('માફ કરશો, કઈક ભૂલ થઈ છે. ફરી પ્રયત્ન કરો.');
                submitBtn.disabled = false;
                submitBtn.innerHTML = "સબમિટ કરો";
            });
    });
</script>
</body>
</html>
