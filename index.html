<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Admission - Vrundavandham</title>
    <style>
        :root { --primary: #0e1e60; --secondary: #a31d24; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .info-title { width: 100%; max-width: 900px; color: var(--primary); font-size: 18px; font-weight: 700; margin: 15px 0 10px 0; border-left: 5px solid var(--secondary); padding-left: 10px; text-align: left; }
        .pdf-box { width: 100%; max-width: 900px; height: 500px; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 20px; background: white; }
        
        /* સ્ટેટસ બોક્સ */
        #statusBox { display: none; width: 100%; max-width: 600px; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; margin: 40px 0; border: 2px solid #e2e8f0; }
        .success-icon { font-size: 50px; color: #10b981; margin-bottom: 15px; }
        
        /* ફોર્મ સેક્શન */
        #formSection { display: none; width: 100%; max-width: 900px; background: #fff; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); border: 1px solid #e2e8f0; overflow: hidden; margin-bottom: 50px; }
        .header-img { width: 100%; height: auto; display: block; border-bottom: 4px solid var(--secondary); }
        .p-content { padding: 25px; }
        .section-bar { background: var(--primary); color: white; padding: 12px; border-radius: 8px; margin: 20px 0 15px 0; font-weight: 600; text-align: left; }
        
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; text-align: left; }
        .field { display: flex; flex-direction: column; margin-bottom: 10px; }
        label { font-size: 14px; font-weight: 700; color: #475569; margin-bottom: 5px; }
        input, select, textarea { padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 15px; width: 100%; box-sizing: border-box; }
        
        .submit-btn { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 20px; font-weight: 800; cursor: pointer; margin-top: 25px; }
        .cancel-btn { background: var(--secondary); color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 20px; }

        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } .pdf-box { height: 400px; } }
    </style>
</head>
<body>

    <div class="info-title">૧. એડમિશન માહિતી</div>
    <iframe src="https://docs.google.com/viewer?url=https://umakhodal1190-droid.github.io/school-admission/Fees.pdf&embedded=true" class="pdf-box"></iframe>

    <div class="info-title">૨. VSGK માહિતી પત્રક</div>
    <iframe src="https://docs.google.com/viewer?url=https://umakhodal1190-droid.github.io/school-admission/VSGK.pdf&embedded=true" class="pdf-box"></iframe>

    <div id="statusBox">
        <div class="success-icon">✔</div>
        <h2 style="color: var(--primary);">તમારું એડમિશન ફોર્મ ભરાઈ ગયું છે!</h2>
        <p style="color: #64748b;">તમે અત્યારે બીજું નવું ફોર્મ ભરી શકશો નહીં.</p>
        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
        <p style="font-size: 14px; color: #a31d24;">જો તમે આ એડમિશન રદ કરવા માંગતા હોવ, તો નીચે ક્લિક કરો:</p>
        <button class="cancel-btn" onclick="handleCancel()">એડમિશન કેન્સલ કરવા માટે અહીં ક્લિક કરો</button>
    </div>

    <div id="formSection">
        <img src="header.jpeg" class="header-img">
        <div class="p-content">
            <h2 style="color:var(--secondary); text-align: center;">શૈક્ષણિક પ્રવેશ ફોર્મ</h2>
            <form id="admissionForm">
                <input type="hidden" name="action" value="add">
                
                <div class="field">
                    <label>વિદ્યાર્થીનું પૂરું નામ (અટક-નામ-પિતાનું નામ)</label>
                    <input type="text" name="studentName" required>
                </div>

                <div class="section-bar">વિગતો ભરો</div>
                <div class="grid">
                    <div class="field"><label>ધોરણ</label><input type="text" name="grade" required></div>
                    <div class="field"><label>મોબાઈલ નંબર</label><input type="tel" name="mobile" id="uMobile" maxlength="10" required></div>
                    <div class="field"><label>આધાર કાર્ડ નંબર</label><input type="text" name="aadhar" id="uAadhar" maxlength="12" required></div>
                    <div class="field"><label>જન્મ તારીખ (DD-MM-YYYY)</label><input type="text" name="dob" placeholder="15-05-2015" pattern="\d{2}-\d{2}-\d{4}" required></div>
                </div>
                
                <button type="submit" id="submitBtn" class="submit-btn">ફોર્મ સબમિટ કરો</button>
            </form>
        </div>
    </div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwayrXM2fif05-jhxT4EczARK39dTmyflCIrouTP63WYYnAs6xZLQeFlj2nrRzazasn/exec';

    // ૧. પેજ લોડ થાય ત્યારે તપાસો
    window.onload = function() {
        if (localStorage.getItem("formSubmitted") === "true") {
            document.getElementById('statusBox').style.display = 'block';
            document.getElementById('formSection').style.display = 'none';
        } else {
            document.getElementById('formSection').style.display = 'block';
        }
    };

    // ૨. ફોર્મ સબમિટ ફંક્શન
    document.getElementById('admissionForm').addEventListener('submit', e => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const mobile = document.getElementById('uMobile').value;
        const aadhar = document.getElementById('uAadhar').value;

        btn.disabled = true; btn.innerHTML = "સબમિટ થઈ રહ્યું છે...";

        fetch(scriptURL, { method: 'POST', body: new FormData(e.target)})
            .then(res => {
                // સફળતા મળે એટલે બ્રાઉઝરમાં ડેટા સેવ કરો
                localStorage.setItem("formSubmitted", "true");
                localStorage.setItem("userMobile", mobile);
                localStorage.setItem("userAadhar", aadhar);
                alert('અભિનંદન! તમારું ફોર્મ સબમિટ થઈ ગયું છે.');
                location.reload();
            })
            .catch(err => { 
                alert('ભૂલ આવી! ફરી પ્રયત્ન કરો.'); 
                btn.disabled = false; 
                btn.innerHTML = "ફોર્મ સબમિટ કરો"; 
            });
    });

    // ૩. કેન્સલ ફંક્શન (ડાયરેક્ટ બટન)
    function handleCancel() {
        const mobile = localStorage.getItem("userMobile");
        const aadhar = localStorage.getItem("userAadhar");

        if(!confirm("શું તમે ખરેખર આ એડમિશન રદ કરવા માંગો છો?")) return;

        const btn = document.querySelector('.cancel-btn');
        btn.disabled = true; btn.innerHTML = "કેન્સલ થઈ રહ્યું છે...";

        const fd = new FormData();
        fd.append('action', 'cancel');
        fd.append('mobile', mobile);
        fd.append('aadhar', aadhar);

        fetch(scriptURL, { method: 'POST', body: fd })
            .then(res => res.text())
            .then(result => {
                if(result.includes("Successfully")) {
                    localStorage.removeItem("formSubmitted");
                    localStorage.removeItem("userMobile");
                    localStorage.removeItem("userAadhar");
                    alert("તમારું એડમિશન કેન્સલ થઈ ગયું છે. હવે તમે નવું ફોર્મ ભરી શકશો.");
                    location.reload();
                } else {
                    alert("કેન્સલ કરવામાં ભૂલ થઈ. કૃપા કરીને એડમિનનો સંપર્ક કરો.");
                    btn.disabled = false; btn.innerHTML = "એડમિશન કેન્સલ કરવા માટે અહીં ક્લિક કરો";
                }
            });
    }
</script>
</body>
</html>
