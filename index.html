<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>એડમિશન ફોર્મ - વૃંદાવનધામ ખીરસરા</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary: #0e1e60; --golden: #d4af37; --bg: #f1f5f9; --success: #16a34a; --red: #dc2626; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        
        #introOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--primary); color: white; display: flex; justify-content: center; align-items: center; z-index: 9999; text-align: center; }
        
        .pdf-box { width: 100%; max-width: 900px; height: 400px; border-radius: 12px; border: 2px solid #cbd5e1; margin-bottom: 20px; background: white; }
        .pdf-title { width: 100%; max-width: 900px; color: var(--primary); background: #e2e8f0; padding: 12px; border-radius: 8px; border-left: 5px solid var(--golden); margin: 20px 0 10px 0; font-size: 1.1rem; font-weight: bold; box-sizing: border-box; }

        #statusBox { display: none; width: 95%; max-width: 650px; background: white; padding: 25px; border-radius: 25px; text-align: center; margin: 20px auto 40px auto; border: 1px solid var(--golden); box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        .status-badge { display: inline-block; padding: 8px 20px; border-radius: 50px; font-weight: bold; margin-bottom: 15px; font-size: 16px; border: 2px solid var(--success); color: var(--success); background: #dcfce7; }
        
        #formHeader, #formSection { display: none; width: 100%; max-width: 900px; }
        .header-img { width: 100%; height: auto; border-radius: 15px 15px 0 0; display: block; }
        
        #formSection { background: #fff; border-radius: 0 0 15px 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid #cbd5e1; border-top: none; padding-bottom: 30px; }
        .p-content { padding: 25px; }
        .section-bar { background: var(--primary); color: white; padding: 12px; border-radius: 8px; margin: 20px 0 10px 0; font-weight: bold; text-align: center; }
        
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .field { display: flex; flex-direction: column; text-align: left; }
        label { font-size: 13px; font-weight: bold; margin-bottom: 5px; color: #444; }
        input, select { padding: 12px; border: 1px solid #ccc; border-radius: 8px; width: 100%; box-sizing: border-box; font-size: 16px; outline: none; }
        
        .btn-submit { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 15px; transition: 0.3s; }
        
        #preview { width: 110px; height: 130px; border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; border-radius: 8px; background: #eee; margin: 0 auto 10px auto; overflow: hidden; }
        #preview img { width: 100%; height: 100%; object-fit: cover; }
        
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div id="introOverlay"><h2>🙏 જય સ્વામિનારાયણ 🙏</h2></div>

    <div id="mainView" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
        <div class="pdf-title">૧. સંસ્થા પરિચય</div>
        <iframe src="https://docs.google.com/viewer?url=https://umakhodal1190-droid.github.io/school-admission/VSGK.pdf&embedded=true" class="pdf-box"></iframe>
        <div class="pdf-title">૨. પ્રવેશના નિયમો અને અન્ય વિગતો</div>
        <iframe src="https://docs.google.com/viewer?url=https://umakhodal1190-droid.github.io/school-admission/DETAILS.pdf&embedded=true" class="pdf-box"></iframe>
        <div class="pdf-title">૩. ફી માળખું (Fees Details)</div>
        <iframe src="https://docs.google.com/viewer?url=https://umakhodal1190-droid.github.io/school-admission/Fees.pdf&embedded=true" class="pdf-box"></iframe>
        
        <button id="applyFormBtn" class="btn-submit" style="max-width: 400px; margin-bottom: 40px;" onclick="showForm()">પ્રવેશ ફોર્મ ભરવા અહીં ક્લિક કરો</button>
    </div>

    <div id="statusBox">
        <div class="status-badge">● પ્રવેશ કન્ફર્મ (Confirmed)</div>
        <h2 style="color: var(--success); margin: 10px 0;">ફોર્મ સફળતાપૂર્વક સબમિટ થયું છે!</h2>
        <p id="userNameDisplay" style="font-weight: bold; font-size: 18px; color: var(--primary);"></p>
        
        <div id="receiptActions">
            <button class="btn-submit" style="background: var(--success);" onclick="generatePDF()">📄 રસીદ (Receipt) ડાઉનલોડ કરો</button>
            <button id="cancelBtn" class="btn-submit" style="background: var(--red); margin-top: 15px;" onclick="cancelAdmission()">❌ આ પ્રવેશ રદ કરો</button>
        </div>
        <p id="redirectMsg" style="display:none; color:var(--red); font-weight:bold; margin-top:20px;"></p>
    </div>

    <div id="formHeader"><img src="https://umakhodal1190-droid.github.io/school-admission/header.jpeg" class="header-img"></div>
    <div id="formSection">
        <div class="p-content">
            <h3 style="text-align:center; color:var(--primary); margin-top:0;">નવું એડમિશન ફોર્મ</h3>
            <form id="admissionForm">
                <div class="grid">
                    <div style="text-align: center;">
                        <div id="preview">વિદ્યાર્થી ફોટો</div>
                        <input type="file" id="uPhotoInput" accept="image/*" onchange="processImg(event)" required>
                    </div>
                    <div class="field" style="grid-column: span 2;">
                        <label>વિદ્યાર્થીનું પૂરું નામ (અટક પ્રથમ)</label>
                        <input type="text" id="uName" placeholder="દા.ત. પટેલ આર્યન રાજેશભાઈ" required>
                    </div>
                </div>

                <div class="section-bar">૧. પ્રવેશ વિગતો</div>
                <div class="grid">
                    <div class="field"><label>ધોરણ</label><input type="text" id="uGrade" required></div>
                    <div class="field"><label>લિંગ</label><select id="uGender"><option value="Kumar">કુમાર</option><option value="Kanya">કન્યા</option></select></div>
                    <div class="field"><label>પ્રવેશ પ્રકાર</label>
                        <select id="uType" onchange="filterCaste()">
                            <option value="Local">Local</option>
                            <option value="Up-Down">Up-Down</option>
                            <option value="Chatralay">Chatralay</option>
                        </select>
                    </div>
                    <div class="field"><label>જ્ઞાતિ</label>
                        <select id="uCaste">
                            <option>Open</option><option>OBC</option><option>SC</option><option>ST</option>
                        </select>
                    </div>
                    <div class="field"><label>વિદ્યાર્થી આધાર નંબર</label><input type="text" id="uAadhar" maxlength="12" pattern="\d{12}" required></div>
                    <div class="field"><label>જન્મ તારીખ</label><input type="text" id="uDob" placeholder="DD/MM/YYYY" required></div>
                </div>

                <div class="section-bar">૨. વાલી વિગત</div>
                <div class="grid">
                    <div class="field" style="grid-column: span 3;"><label>પિતાનું નામ</label><input type="text" id="uFather" required></div>
                    <div class="field" style="grid-column: span 3;"><label>પિતાનો આધાર નંબર</label><input type="text" id="fAadhar" maxlength="12" pattern="\d{12}" required></div>
                    <div class="field" style="grid-column: span 3;"><label>મોબાઈલ નંબર</label><input type="tel" id="uMobile" maxlength="10" pattern="\d{10}" required></div>
                    <div class="field" style="grid-column: span 3;"><label>સરનામું</label><input type="text" id="uAddress" required></div>
                </div>
                
                <input type="hidden" id="uPhotoData">
                <button type="submit" id="submitBtn" class="btn-submit">સબમિટ કરો</button>
            </form>
        </div>
    </div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwJbT1rUhqkgXtv8gpTfB2iKy6TirR5dh_91QGi9Lt2V6BLAPBd3DbdYtyJzVM-c5eG/exec';

    window.onload = () => { 
        setTimeout(() => { document.getElementById('introOverlay').style.display = 'none'; }, 1000);
        if (localStorage.getItem("formSubmitted") === "true") { showSuccessView(); } 
    };

    function showForm() {
        document.getElementById('mainView').style.display = 'none';
        document.getElementById('formHeader').style.display = 'block';
        document.getElementById('formSection').style.display = 'block';
    }

    function processImg(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (ev) => {
            const img = new Image();
            img.src = ev.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const maxWidth = 300;
                const scale = maxWidth / img.width;
                canvas.width = maxWidth; canvas.height = img.height * scale;
                canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                const base64 = canvas.toDataURL('image/jpeg', 0.6);
                document.getElementById('uPhotoData').value = base64;
                document.getElementById('preview').innerHTML = `<img src="${base64}">`;
            };
        };
        reader.readAsDataURL(file);
    }

    function filterCaste() {
        const type = document.getElementById('uType').value;
        const casteSelect = document.getElementById('uCaste');
        casteSelect.innerHTML = "";
        const options = (type === "Chatralay") ? ["Open", "OBC"] : ["Open", "OBC", "SC", "ST"];
        options.forEach(opt => casteSelect.add(new Option(opt, opt)));
    }

    document.getElementById('admissionForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true; btn.innerHTML = "સબમિટ થઈ રહ્યું છે... ⏳";
        
        const data = {
            studentName: document.getElementById('uName').value,
            grade: document.getElementById('uGrade').value,
            gender: document.getElementById('uGender').value,
            caste: document.getElementById('uCaste').value,
            studentType: document.getElementById('uType').value,
            aadhar: document.getElementById('uAadhar').value,
            fatherName: document.getElementById('uFather').value,
            fatherAadhar: document.getElementById('fAadhar').value,
            mobile: document.getElementById('uMobile').value,
            address: document.getElementById('uAddress').value,
            dob: document.getElementById('uDob').value,
            photoData: document.getElementById('uPhotoData').value,
            action: "insert"
        };

        fetch(scriptURL, { method: 'POST', body: JSON.stringify(data)})
        .then(() => {
            localStorage.setItem("tempData", JSON.stringify(data));
            localStorage.setItem("formSubmitted", "true");
            showSuccessView();
        })
        .catch(() => {
            alert("ભૂલ આવી! ફરી પ્રયાસ કરો.");
            btn.disabled = false; btn.innerHTML = "સબમિટ કરો";
        });
    });

    function showSuccessView() {
        const data = JSON.parse(localStorage.getItem("tempData"));
        document.getElementById('mainView').style.display = 'none';
        document.getElementById('formHeader').style.display = 'none';
        document.getElementById('formSection').style.display = 'none';
        document.getElementById('userNameDisplay').innerText = "વિદ્યાર્થી: " + data.studentName;
        document.getElementById('statusBox').style.display = 'block';
        window.scrollTo(0,0);
    }

    function cancelAdmission() {
        if(!confirm("શું તમે આ પ્રવેશ રદ કરવા માંગો છો?")) return;
        const btn = document.getElementById('cancelBtn');
        const msg = document.getElementById('redirectMsg');
        btn.disabled = true; btn.innerHTML = "રદ થઈ રહ્યું છે... ⏳";
        msg.style.display = "block";
        msg.innerHTML = "સર્વર સાથે સંપર્ક થઈ રહ્યો છે, રાહ જુઓ...";

        const data = JSON.parse(localStorage.getItem("tempData"));
        const failsafe = setTimeout(() => clearAndReload(), 20000);

        fetch(scriptURL, { method: 'POST', body: JSON.stringify({ 
            studentName: data.studentName, mobile: data.mobile, action: "cancel" 
        })})
        .then(() => { clearTimeout(failsafe); clearAndReload(); })
        .catch(() => { clearTimeout(failsafe); clearAndReload(); });
    }

    function clearAndReload() {
        localStorage.removeItem("formSubmitted");
        localStorage.removeItem("tempData");
        document.getElementById('redirectMsg').innerHTML = "✅ સફળતાપૂર્વક રદ થયું છે. પેજ રીલોડ થઈ રહ્યું છે...";
        setTimeout(() => location.reload(), 2000);
    }

    function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const data = JSON.parse(localStorage.getItem("tempData"));
        doc.setFillColor(14, 30, 96); doc.rect(0, 0, 210, 40, 'F');
        doc.setTextColor(255); doc.setFontSize(20); doc.text("VRUNDAVANDHAM KHIRASARA GURUKUL", 105, 20, {align:"center"});
        doc.setFontSize(14); doc.text("ADMISSION RECEIPT", 105, 32, {align:"center"});
        doc.setTextColor(0); doc.text("Student: " + data.studentName, 20, 60);
        doc.text("Grade: " + data.grade, 20, 70);
        doc.text("Mobile: " + data.mobile, 20, 80);
        doc.save(`Receipt_${data.studentName}.pdf`);
    }
</script>
</body>
</html>
