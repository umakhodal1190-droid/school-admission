<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>પ્રવેશ ફોર્મ - VRUNDAVANDHAM KHIRASARA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary: #0e1e60; --golden: #d4af37; --bg: #f1f5f9; --success: #16a34a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        #splashScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; justify-content: center; align-items: center; z-index: 99999; }
        .info-title { width: 100%; max-width: 900px; color: var(--primary); font-size: 18px; font-weight: 700; margin: 15px 0 10px 0; border-left: 5px solid var(--golden); padding-left: 10px; text-align: left; }
        .pdf-box { width: 100%; max-width: 900px; height: 350px; border-radius: 12px; border: 1px solid #cbd5e1; margin-bottom: 20px; background: white; }
        #statusBox { display: none; width: 100%; max-width: 600px; background: white; padding: 30px; border-radius: 20px; text-align: center; margin: 40px 0; border: 2px solid var(--golden); }
        #formSection { display: none; width: 100%; max-width: 900px; background: #fff; border-radius: 15px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); overflow: hidden; margin-bottom: 50px; }
        .header-img { width: 100%; height: auto; display: block; border-bottom: 4px solid var(--golden); }
        .p-content { padding: 25px; }
        .section-bar { background: var(--primary); color: white; padding: 12px; border-radius: 8px; margin: 20px 0 15px 0; font-weight: 600; text-align: left; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .field { display: flex; flex-direction: column; text-align: left; }
        label { font-size: 13px; font-weight: 700; color: #334155; margin-bottom: 5px; }
        input, select, textarea { padding: 12px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 14px; width: 100%; box-sizing: border-box; }
        .btn-submit { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 30px; }
        #preview { width: 110px; height: 130px; background: #eee; border: 1px solid #ddd; margin-bottom: 10px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .span-2 { grid-column: span 2; } .span-3 { grid-column: span 3; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } .span-2, .span-3 { grid-column: span 1; } }
    </style>
</head>
<body>

    <div id="splashScreen"><h2>🙏 જય સ્વામિનારાયણ 🙏</h2></div>

    <div id="mainView" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
        <div class="info-title">૧. ફી માળખું</div>
        <iframe src="https://docs.google.com/viewer?url=https://umakhodal1190-droid.github.io/school-admission/Fees.pdf&embedded=true" class="pdf-box"></iframe>
        <div class="info-title">૨. VSGK માહિતી પત્રક</div> 
        <iframe src="https://docs.google.com/viewer?url=https://umakhodal1190-droid.github.io/school-admission/VSGK.pdf&embedded=true" class="pdf-box"></iframe>
        <button class="btn-submit" style="max-width: 500px;" onclick="toggleForm()">લોકલ અને અપડાઉન પ્રવેશ ફોર્મ ભરવા અહીં ક્લિક કરો</button>
    </div>

    <div id="statusBox">
        <h2 style="color: var(--success);">✅ એડમિશન કન્ફર્મ છે!</h2>
        <p>તમારી પ્રવેશ રસીદ ઓટોમેટિક ડાઉનલોડ થઈ ગઈ છે.</p>
        <button class="btn-submit" onclick="resetApp()">➕ નવું ફોર્મ ભરો</button>
    </div>

    <div id="formSection">
        <img src="header.jpeg" class="header-img">
        <div class="p-content">
            <h2 style="text-align:center; color:var(--primary);">લોકલ અને અપડાઉન પ્રવેશ ફોર્મ</h2>
            <form id="admissionForm">
                <div class="grid">
                    <div style="grid-column: span 1; text-align: center;">
                        <div id="preview">વિદ્યાર્થી ફોટો</div>
                        <input type="file" id="photoFile" accept="image/*" onchange="handleImg(event, 'preview', 'uPhotoData')" required>
                    </div>
                    <div class="field span-2">
                        <label>વિદ્યાર્થીનું પૂરું નામ (અટક પ્રથમ)</label>
                        <input type="text" id="uName" placeholder="અટક નામ પિતાનું નામ" required>
                    </div>
                </div>

                <div class="section-bar">૧. પ્રવેશ વિગતો</div>
                <div class="grid">
                    <div class="field"><label>ધોરણ</label><input type="text" id="uGrade" required></div>
                    <div class="field"><label>લિંગ</label><select id="uGender"><option>કુમાર</option><option>કન્યા</option></select></div>
                    <div class="field"><label>જ્ઞાતિ</label><select id="uCaste"><option>Open</option><option>OBC</option><option>SC</option><option>ST</option></select></div>
                    <div class="field"><label>પ્રવેશ પ્રકાર</label><select id="uType"><option>Local(લોકલ)</option><option>Up-Down(અપડાઉન)</option></select></div>
                    <div class="field"><label>જન્મ તારીખ</label><input type="text" id="uDob" placeholder="DD/MM/YYYY" required></div>
                    <div class="field"><label>આધાર નંબર</label><input type="text" id="uAadhar" maxlength="12" required></div>
                    <div class="field"><label>મોબાઈલ નંબર</label><input type="tel" id="uMobile" maxlength="10" required></div>
                </div>

                <div class="section-bar">૨. ડોક્યુમેન્ટ અપલોડ</div>
                <div class="grid">
                    <div class="field span-2"><label>વિદ્યાર્થી આધાર કાર્ડ</label><input type="file" id="uAadharFile" accept="image/*" onchange="handleImg(event, '', 'uAadharImgData')" required></div>
                    <div class="field span-2"><label>પિતાનું આધાર કાર્ડ</label><input type="file" id="uFatherAadharFile" accept="image/*" onchange="handleImg(event, '', 'uFatherImgData')" required></div>
                </div>

                <div class="section-bar">૩. વાલીની વિગત</div>
                <div class="grid">
                    <div class="field span-2"><label>પિતાનું પૂરું નામ</label><input type="text" id="uFather" required></div>
                    <div class="field"><label>પિતાનો આધાર નંબર</label><input type="text" id="uFatherAadhar" maxlength="12" required></div>
                    <div class="field span-3"><label>સરનામું</label><textarea id="uAddress" rows="2" required></textarea></div>
                </div>

                <input type="hidden" id="uPhotoData">
                <input type="hidden" id="uAadharImgData">
                <input type="hidden" id="uFatherImgData">
                <button type="submit" id="submitBtn" class="btn-submit">ફોર્મ સબમિટ કરો</button>
            </form>
        </div>
    </div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyoEu2BByGRJMWGaNWcsuxH00FOrjh_d2ro3febg2NdYMYnlABdH_wyBbUjmTE3inpD/exec';

    window.onload = () => {
        setTimeout(() => document.getElementById('splashScreen').style.display = 'none', 1000);
        if(localStorage.getItem("done") === "true") {
            document.getElementById('mainView').style.display = 'none';
            document.getElementById('statusBox').style.display = 'block';
        }
    };

    function toggleForm() { document.getElementById('formSection').style.display='block'; document.getElementById('mainView').style.display='none'; }

    async function handleImg(e, prevId, hiddenId) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (ev) => {
            const img = new Image();
            img.src = ev.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const maxWidth = 400; 
                const scale = maxWidth / img.width;
                canvas.width = maxWidth; canvas.height = img.height * scale;
                canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                const base64 = canvas.toDataURL('image/jpeg', 0.6);
                document.getElementById(hiddenId).value = base64;
                if(prevId) document.getElementById(prevId).innerHTML = `<img src="${base64}" style="width:100%;height:100%;object-fit:cover;">`;
            };
        };
    }

    document.getElementById('admissionForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true; btn.innerHTML = "સેવ થઈ રહ્યું છે...";

        const data = {
            studentName: document.getElementById('uName').value,
            grade: document.getElementById('uGrade').value,
            gender: document.getElementById('uGender').value,
            caste: document.getElementById('uCaste').value,
            studentType: document.getElementById('uType').value,
            aadhar: document.getElementById('uAadhar').value,
            fatherName: document.getElementById('uFather').value,
            fatherAadhar: document.getElementById('uFatherAadhar').value,
            mobile: document.getElementById('uMobile').value,
            address: document.getElementById('uAddress').value,
            dob: document.getElementById('uDob').value,
            photoData: document.getElementById('uPhotoData').value,
            studentAadharData: document.getElementById('uAadharImgData').value,
            fatherAadharData: document.getElementById('uFatherImgData').value
        };

        localStorage.setItem("tempData", JSON.stringify(data));

        fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) })
        .then(() => {
            setTimeout(() => {
                generatePDF();
                localStorage.setItem("done", "true");
                location.reload();
            }, 3000);
        })
        .catch(err => { alert("ભૂલ આવી: " + err); btn.disabled = false; btn.innerHTML = "ફોર્મ સબમિટ કરો"; });
    });

    function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const data = JSON.parse(localStorage.getItem("tempData"));
        
        doc.setFillColor(14, 30, 96); doc.rect(0, 0, 210, 40, 'F');
        doc.setTextColor(255); doc.setFontSize(20); doc.text("VRUNDAVANDHAM KHIRASARA", 105, 25, {align:"center"});
        
        doc.setTextColor(0); doc.setFontSize(11);
        let y = 50;
        doc.text("વિદ્યાર્થી નામ: " + data.studentName, 20, y);
        doc.text("ધોરણ: " + data.grade + " | લિંગ: " + data.gender, 20, y+10);
        doc.text("જ્ઞાતિ: " + data.caste + " | પ્રવેશ પ્રકાર: " + data.studentType, 20, y+20);
        doc.text("આધાર: " + data.aadhar + " | મોબાઈલ: " + data.mobile, 20, y+30);
        doc.text("પિતાનું નામ: " + data.fatherName, 20, y+40);
        doc.text("પિતાનો આધાર: " + data.fatherAadhar, 20, y+50);
        doc.text("સરનામું: " + data.address, 20, y+60);
        doc.text("જન્મ તારીખ: " + data.dob, 20, y+70);
        
        doc.save(`Receipt_${data.studentName}.pdf`);
    }

    function resetApp() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
