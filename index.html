<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Admission - Vrundavandham</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary: #0e1e60; --secondary: #a31d24; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .info-title { width: 100%; max-width: 900px; color: var(--primary); font-size: 20px; font-weight: 700; margin: 20px 0 10px 0; border-left: 5px solid var(--secondary); padding-left: 10px; text-align: left; }
        .pdf-box { width: 100%; max-width: 900px; height: 450px; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 20px; background: white; }
        .show-form-btn { width: 100%; max-width: 900px; padding: 20px; background: var(--secondary); color: white; border: none; border-radius: 50px; font-size: 22px; font-weight: 800; cursor: pointer; margin: 20px 0; box-shadow: 0 8px 20px rgba(163, 29, 36, 0.3); transition: 0.3s; }
        
        #statusBox { display: none; width: 100%; max-width: 600px; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; margin: 40px 0; border: 2px solid #e2e8f0; }
        
        /* PDF ડાઉનલોડ બટન સ્ટાઈલ */
        .btn-download { background: #10b981; color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; margin: 10px; font-size: 16px; }
        .btn-cancel { background: var(--secondary); color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; margin: 10px; font-size: 16px; }

        #formSection { display: none; width: 100%; max-width: 900px; background: #fff; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); border: 1px solid #e2e8f0; overflow: hidden; margin-bottom: 50px; }
        .header-img { width: 100%; height: auto; display: block; border-bottom: 4px solid var(--secondary); }
        .p-content { padding: 30px; }
        .section-bar { background: var(--primary); color: white; padding: 12px; border-radius: 8px; margin: 25px 0 15px 0; font-weight: 600; text-align: left; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; text-align: left; }
        .field { display: flex; flex-direction: column; }
        label { font-size: 14px; font-weight: 700; color: #475569; margin-bottom: 5px; }
        input, select, textarea { padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 15px; }
        
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="info-title">૧. એડમિશન માહિતી</div>
    <iframe src="https://docs.google.com/viewer?url=https://umakhodal1190-droid.github.io/school-admission/Fees.pdf&embedded=true" class="pdf-box"></iframe>

    <div class="info-title">૨. VSGK માહિતી પત્રક</div>
    <iframe src="https://docs.google.com/viewer?url=https://umakhodal1190-droid.github.io/school-admission/VSGK.pdf&embedded=true" class="pdf-box"></iframe>

    <button id="mainOpenBtn" class="show-form-btn" onclick="toggleForm()">સ્કૂલ પ્રવેશ ફોર્મ ભરવા માટે અહીં ક્લિક કરો</button>

    <div id="statusBox">
        <h2 style="color: var(--primary);">તમારું એડમિશન ફોર્મ ભરાઈ ગયું છે! ✅</h2>
        <p style="color: #64748b;">નીચે આપેલા બટન પરથી તમે તમારું ફોર્મ ડાઉનલોડ કરી શકો છો.</p>
        
        <button class="btn-download" onclick="downloadPDF()">📄 પ્રવેશ ફોર્મ PDF ડાઉનલોડ કરો</button>
        <br>
        <button class="btn-cancel" onclick="handleCancel()">❌ એડમિશન કેન્સલ કરો</button>
    </div>

    <div id="formSection">
        <img src="header.jpeg" class="header-img">
        <div class="p-content">
            <h2 style="color:var(--secondary); text-align: center;">શૈક્ષણિક પ્રવેશ ફોર્મ</h2>
            <form id="admissionForm">
                <input type="hidden" name="action" value="add">
                <div class="grid">
                    <div class="field" style="grid-column: span 3;">
                        <label>વિદ્યાર્થીનું પૂરું નામ</label>
                        <input type="text" id="uName" name="studentName" required>
                    </div>
                    <div class="field"><label>ધોરણ</label><input type="text" id="uGrade" name="grade" required></div>
                    <div class="field"><label>મોબાઈલ નંબર</label><input type="tel" id="uMobile" name="mobile" required></div>
                    <div class="field"><label>આધાર કાર્ડ</label><input type="text" id="uAadhar" name="aadhar" required></div>
                </div>
                <button type="submit" id="submitBtn" class="show-form-btn" style="margin-top:20px;">સબમિટ કરો</button>
            </form>
        </div>
    </div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyauyu_OnhiGEhpoWZovKjOQ59eFmN07PGKOrghWPwOgESI600J5uOXcg9FsO79wGRl/exec';

    window.onload = function() {
        if (localStorage.getItem("formSubmitted") === "true") {
            document.getElementById('statusBox').style.display = 'block';
            document.getElementById('mainOpenBtn').style.display = 'none';
        }
    };

    function toggleForm() {
        document.getElementById('formSection').style.display = 'block';
        document.getElementById('mainOpenBtn').style.display = 'none';
        document.getElementById('formSection').scrollIntoView({ behavior: 'smooth' });
    }

    // ફોર્મ સબમિટ
    document.getElementById('admissionForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true; btn.innerHTML = "સેવ થઈ રહ્યું છે...";

        const name = document.getElementById('uName').value;
        const grade = document.getElementById('uGrade').value;
        const mobile = document.getElementById('uMobile').value;

        fetch(scriptURL, { method: 'POST', body: new FormData(this)})
            .then(res => {
                // ડેટા લોકલ સેવ કરો જેથી PDF માં વાપરી શકાય
                localStorage.setItem("formSubmitted", "true");
                localStorage.setItem("savedName", name);
                localStorage.setItem("savedGrade", grade);
                localStorage.setItem("savedMobile", mobile);
                
                alert('ફોર્મ સબમિટ થઈ ગયું છે!');
                location.reload();
            });
    });

    // PDF ડાઉનલોડ ફંક્શન
    function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();

        const name = localStorage.getItem("savedName") || "N/A";
        const grade = localStorage.getItem("savedGrade") || "N/A";
        const mobile = localStorage.getItem("savedMobile") || "N/A";

        // PDF ડિઝાઇન
        doc.setFontSize(22);
        doc.setTextColor(14, 30, 96);
        doc.text("Vrundavandham Khirasara", 105, 20, { align: "center" });
        
        doc.setFontSize(16);
        doc.setTextColor(163, 29, 36);
        doc.text("Admission Form Receipt", 105, 30, { align: "center" });

        doc.setLineWidth(0.5);
        doc.line(20, 35, 190, 35);

        doc.setFontSize(12);
        doc.setTextColor(0, 0, 0);
        doc.text(`Student Name: ${name}`, 20, 50);
        doc.text(`Grade: ${grade}`, 20, 60);
        doc.text(`Mobile Number: ${mobile}`, 20, 70);
        doc.text(`Status: Successfully Submitted`, 20, 80);

        doc.setFontSize(10);
        doc.text("This is a computer generated receipt.", 105, 100, { align: "center" });

        doc.save(`Admission_${name}.pdf`);
    }

    function handleCancel() {
        if(confirm("શું તમે ખરેખર કેન્સલ કરવા માંગો છો?")) {
            localStorage.clear();
            alert("કેન્સલ થઈ ગયું છે.");
            location.reload();
        }
    }
</script>
</body>
</html>
