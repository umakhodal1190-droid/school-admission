<html lang="gu">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>લોકલ અને અપડાઉન પ્રવેશ ફોર્મ - VSGK</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary: #0e1e60; --golden: #d4af37; --bg: #f1f5f9; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        
        /* PDF Preview Section */
        .info-title { width: 100%; max-width: 900px; color: var(--primary); font-size: 18px; font-weight: 700; margin: 15px 0 10px 0; border-left: 5px solid var(--golden); padding-left: 10px; }
        .pdf-box { width: 100%; max-width: 900px; height: 380px; border-radius: 12px; border: 1px solid #cbd5e1; margin-bottom: 20px; background: white; }
        
        /* Main Button */
        .btn-main { width: 100%; max-width: 900px; padding: 20px; background: linear-gradient(135deg, var(--primary), #1e3a8a); color: white; border: none; border-radius: 12px; font-size: 20px; font-weight: 800; cursor: pointer; margin: 20px 0; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); transition: 0.3s; }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        
        /* Status Box */
        #statusBox { display: none; width: 100%; max-width: 600px; background: white; padding: 40px 20px; border-radius: 24px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); text-align: center; margin: 40px 0; border: 2px solid var(--golden); }
        .btn-action { color: white; border: none; padding: 14px 30px; border-radius: 12px; cursor: pointer; font-weight: bold; margin: 10px; font-size: 16px; width: 80%; }
        .btn-download { background: #059669; }
        .btn-cancel { background: #dc2626; }

        /* Form Styling */
        #formSection { display: none; width: 100%; max-width: 900px; background: #fff; border-radius: 20px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); overflow: hidden; margin-bottom: 50px; }
        .header-img { width: 100%; height: auto; display: block; }
        .p-content { padding: 30px; }
        .form-header-text { text-align: center; color: var(--primary); margin-bottom: 30px; border-bottom: 2px solid var(--golden); padding-bottom: 10px; }
        
        .section-bar { background: var(--primary); color: white; padding: 12px 15px; border-radius: 8px; margin: 25px 0 15px 0; font-weight: 600; font-size: 16px; }
        
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .field { display: flex; flex-direction: column; text-align: left; }
        label { font-size: 14px; font-weight: 700; color: #334155; margin-bottom: 6px; }
        input, select, textarea { padding: 12px; border: 1.5px solid #e2e8f0; border-radius: 10px; font-size: 15px; transition: 0.2s; }
        input:focus { border-color: var(--primary); outline: none; background: #f8fafc; }
