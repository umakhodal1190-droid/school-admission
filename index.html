<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>પ્રવેશ ફોર્મ - VRUNDAVANDHAM KHIRASARA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary: #0e1e60; --golden: #d4af37; --bg: #f1f5f9; --red: #dc2626; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        
        #introOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--primary); color: white; display: flex; justify-content: center; align-items: center; z-index: 9999; text-align: center; }
        .intro-text { font-size: 30px; font-weight: bold; }

        .pdf-box { width: 100%; max-width: 900px; height: 350px; border-radius: 12px; border: 2px solid #cbd5e1; margin-bottom: 20px; background: white; }
        .pdf-title { width: 100%; max-width: 900px; color: var(--primary); background: #e2e8f0; padding: 12px; border-radius: 8px; border-left: 5px solid var(--golden); margin: 20px 0 10px 0; font-size: 1.1rem; font-weight: bold; box-sizing: border-box; }

        #statusBox { display: none; width: 100%; max-width: 600px; background: white; padding: 30px; border-radius: 20px; text-align: center; margin: 40px 0; border: 2px solid var(--golden); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        #formHeader { width: 100%; max-width: 900px; text-align: center; background: white; border-radius: 15px 15px 0 0; border: 1px solid #cbd5e1; border-bottom: none; display: none; overflow: hidden; }
        .header-img { width: 100%; height: auto; display: block; }

        #formSection { display: none; width: 100%; max-width: 900px; background: #fff; border-radius: 0 0 15px 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; margin-bottom: 50px; border: 1px solid #cbd5e1; border-top: none; }
        .p-content { padding: 25px; }
        .section-bar { background: var(--primary); color: white; padding: 12px; border-radius: 8px; margin: 20px 0 10px 0; font-weight: bold; }
        
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .field { display: flex; flex-direction: column; text-align: left; }
        
        label { font-size: 13px; font-weight: bold; margin-bottom: 5px; color: #444; }
        input, select { padding: 12px; border: 1px solid #ccc; border-radius: 8px; width: 100%; box-sizing: border-box; font-size: 16px; }
        .btn-submit { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 15px; transition: 0.3s; }
        
        #preview { width: 110px; height: 130px; background: #eee; border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; overflow: hidden; margin-bottom: 10px; border-radius: 8px; }
        #preview img { width: 100%; height: 100%; object-fit: cover; }
        
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div id="introOverlay"><div class="intro-text">🙏 જય સ્વામિનારાયણ 🙏</div></div>

    <div id="mainView" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
        <div class="pdf-title">૧. સંસ્થા પરિચય</div>
        <iframe src="https://docs.google.com/viewer?url=https://umakhodal1190-droid.github.io/school-admission/VSGK.pdf&embedded=true" class="pdf-box"></iframe>

        <div class="pdf-title">૨. સ્કૂલ એડમિશન માહિતી</div>
        <iframe src="https://docs.google.com/viewer?url=https://umakhodal1190-droid.github.io/school-admission/Fees.pdf&embedded=true" class="pdf-box"></iframe>

        <button class="btn-submit" style="max-width: 400px; margin-top: 10px; margin-bottom: 30px;" onclick="checkExistingForm()">પ્રવેશ ફોર્મ ભરવા અહીં ક્લિક કરો</button>
    </div>

    <div id="statusBox">
        <h2 style="color: #16a34a;">✅ ફોર્મ સફળતાપૂર્વક સબમિટ થયેલ છે!</h2>
        <p id="userNameDisplay" style="font-weight: bold; font-size: 18px; margin: 15px 0; color: var(--primary);"></p>
        
        <button class="btn-submit" style="background: #16a34a;" onclick="generatePDF()">📄 રસીદ (Receipt) ડાઉનલોડ કરો</button>
        <button id="cancelBtn" class="btn-submit" style="background: var(--red); margin-top: 10px;" onclick="cancelFormAction()">❌ ફોર્મ રદ (Cancel) કરો</button>
        <button class="btn-submit" style="margin-top:20px; background: var(--golden);" onclick="resetApp()">➕ નવું ફોર્મ ભરો</button>
    </div>

    <div id="formHeader"><img src="https://umakhodal1190-droid.github.io/school-admission/header.jpeg" class="header-img"></div>

    <div id="formSection">
        <div class="p-content">
            <h3 style="text-align:center; color:var(--primary); margin:0 0 20px 0;">લોકલ અને અપડાઉન પ્રવેશ ફોર્મ</h3>
            <form id="admissionForm">
                <div class="grid">
                    <div style="text-align: center;">
                        <div id="preview">વિદ્યાર્થી ફોટો</div>
                        <input type="file" id="photoInput" accept="image/*" onchange="processImg(event)" required>
                    </div>
                    <div class="field" style="grid-column: span 2;">
                        <label>વિદ્યાર્થીનું પૂરું નામ (અટક પ્રથમ)</label>
                        <input type="text" id="uName" placeholder="અટક નામ પિતાનું નામ" required>
                    </div>
                </div>

                <div class="section-bar">૧. પ્રવેશ વિગતો</div>
                <div class="grid">
                    <div class="field"><label>ધોરણ</label><input type="text" id="uGrade" required></div>
                    <div class="field"><label>લિંગ</label><select id="uGender"><option value="Kumar">કુમાર</option><option value="Kanya">કન્યા</option></select></div>
                    <div class="field"><label>જ્ઞાતિ</label><select id="uCaste"><option>Open</option><option>OBC</option><option>SC</option><option>ST</option></select></div>
                    <div class="field"><label>પ્રવેશ પ્રકાર</label><select id="uType"><option>Local</option><option>Up-Down</option></select></div>
                    <div class="field"><label>વિદ્યાર્થી આધાર નંબર</label><input type="text" id="uAadhar" maxlength="12" pattern="\d{12}" required></div>
                    <div class="field"><label>જન્મ તારીખ</label><input type="text" id="uDob" placeholder="DD/MM/YYYY" required></div>
                </div>

                <div class="section-bar">૨. વાલી વિગત</div>
                <div class="grid">
                    <div class="field" style="grid-column: span 3;"><label>પિતાનું નામ</label><input type="text" id="uFather" required></div>
                    <div class="field" style="grid-column: span 3;"><label>પિતાનો આધાર નંબર</label><input type="text" id="uFatherAadhar" maxlength="12" pattern="\d{12}" required></div>
                    <div class="field" style="grid-column: span 3;"><label>મોબાઈલ નંબર</label><input type="tel" id="uMobile" maxlength="10" pattern="\d{10}" required></div>
                    <div class="field" style="grid-column: span 3;"><label>સરનામું</label><input type="text" id="uAddress" required></div>
                </div>
                
                <input type="hidden" id="uPhotoData">
                <button type="submit" id="submitBtn" class="btn-submit">માહિતી સેવ કરો</button>
                <button type="button" class="btn-submit" style="background:#64748b; margin-top:10px;" onclick="location.reload()">પાછા જાઓ</button>
            </form>
        </div>
    </div>

<script>
    // તમારી નવી Deployment URL અહીં મૂકો
    const scriptURL = 'https://script.google.com/macros/s/AKfycby3IRajD8gPfZjv1MRNZDYrhBGMiCFHGfkH_UV7pU2n5l7GuncdZUHNZgKZqiMMFVhZ/exec';

    window.onload = () => { 
        setTimeout(() => { document.getElementById('introOverlay').style.display = 'none'; }, 1200); 
    };

    // ચેક કરો કે પહેલેથી ફોર્મ ભરેલું છે?
    function checkExistingForm() {
        if (localStorage.getItem("formSubmitted") === "true") {
            const data = JSON.parse(localStorage.getItem("tempData"));
            document.getElementById('mainView').style.display = 'none';
            document.getElementById('userNameDisplay').innerText = "વિદ્યાર્થી: " + data.studentName;
            document.getElementById('statusBox').style.display = 'block';
            window.scrollTo(0,0);
        } else {
            showForm();
        }
    }

    function showForm() {
        document.getElementById('mainView').style.display = 'none';
        document.getElementById('formHeader').style.display = 'block';
        document.getElementById('formSection').style.display = 'block';
        window.scrollTo(0,0);
    }

    // ફોટાને પ્રોસેસ કરવાનું સુધારેલું ફંક્શન (હાઈ-ક્વોલિટી માટે)
    function processImg(e) {
        const file = e.target.files[0];
        if(!file) return;
        
        // જો ફોટો બહુ મોટો (>5MB) હોય તો ચેતવણી આપો (વૈકલ્પિક)
        if(file.size > 5 * 1024 * 1024) {
            alert("ફોટો બહુ મોટો છે. સેવ થવામાં સમય લાગી શકે છે.");
        }

        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (ev) => {
            const img = new Image();
            img.src = ev.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                // હાઈ-ક્વોલિટી માટે સાઈઝ વધારી (800px)
                const maxWidth = 800; 
                const scale = maxWidth / img.width;
                canvas.width = maxWidth; canvas.height = img.height * scale;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                
                // ક્વોલિટી 0.8 (80%) રાખી જેથી ક્વોલિટી સારી રહે
                const base64 = canvas.toDataURL('image/jpeg', 0.8); 
                document.getElementById('uPhotoData').value = base64;
                document.getElementById('preview').innerHTML = `<img src="${base64}" style="width:100%;">`;
            };
        };
    }

    // ફોર્મ સબમિટ કરવાનું સુધારેલું ફંક્શન (POST પદ્ધતિ)
    document.getElementById('admissionForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true; btn.innerHTML = "સેવ થઈ રહ્યું છે... (રાહ જુઓ) ⏳";
        
        const data = {
            action: "save",
            studentName: document.getElementById('uName').value,
            grade: document.getElementById('uGrade').value,
            gender: document.getElementById('uGender').value,
            caste: document.getElementById('uCaste').value,
            studentType: document.getElementById('uType').value,
            aadhar: document.getElementById('uAadhar').value,
            fatherName: document.getElementById('uFather').value,
            fatherAadhar: document.getElementById('uFatherAadhar').value,
            mobile: document.getElementById('uMobile').value,
            address: document.getElementById('uAddress').value,
            dob: document.getElementById('uDob').value,
            photoData: document.getElementById('uPhotoData').value // હાઈ-ક્વોલિટી ફોટો ડેટા
        };

        // ડેટા લોકલ સેવ કરો (રસીદ માટે)
        localStorage.setItem("tempData", JSON.stringify(data));
        
        // POST પદ્ધતિથી ડેટા મોકલો (ગમે તેટલો મોટો ડેટા સેવ થશે)
        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors', // CORS એરર ટાળવા માટે
            cache: 'no-cache',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        })
        .then(() => {
            // mode: 'no-cors' માં રિસ્પોન્સ નથી મળતો, પણ ડેટા સેવ થઈ જાય છે.
            // આપણે એવું માની લઈએ કે જો ભૂલ ન આવી તો ડેટા સેવ થઈ ગયો છે.
            // રસીદ નંબર માટે આપણે લોકલ મેમરીનો ઉપયોગ કરીશું (અથવા પછીથી અપડેટ કરીશું)
            localStorage.setItem("formSubmitted", "true");
            // mode: no-cors માં રસીદ નંબર પાછો નથી મળતો, તેથી આપણે હમણાં '---' બતાવીશું
            localStorage.setItem("currentReceiptNo", "---"); 
            
            showSuccessRow();
        })
        .catch(error => {
            console.error('Error:', error);
            alert("નેટવર્ક ધીમું છે અથવા કોઈ ભૂલ આવી છે. કૃપા કરીને થોડીવાર પછી ફરી પ્રયાસ કરો.");
            btn.disabled = false; btn.innerHTML = "માહિતી સેવ કરો";
        });
    });

    function showSuccessRow() {
        const data = JSON.parse(localStorage.getItem("tempData"));
        document.getElementById('formHeader').style.display = 'none';
        document.getElementById('formSection').style.display = 'none';
        document.getElementById('userNameDisplay').innerText = "વિદ્યાર્થી: " + data.studentName;
        document.getElementById('statusBox').style.display = 'block';
        window.scrollTo(0,0);
    }

    // ફોર્મ રદ (Cancel) કરવાનું સુધારેલું ફંક્શન (POST પદ્ધતિ)
    function cancelFormAction() {
        if (!confirm("શું તમે ખરેખર આ ફોર્મ રદ (Cancel) કરવા માંગો છો?")) return;
        const cBtn = document.getElementById('cancelBtn');
        cBtn.disabled = true; cBtn.innerHTML = "રદ થઈ રહ્યું છે...";
        
        const data = { action: "cancel" };

        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            cache: 'no-cache',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        })
        .then(() => {
            alert("ફોર્મ સફળતાપૂર્વક રદ કરવામાં આવ્યું છે."); 
            resetApp();
        })
        .catch(error => {
            console.error('Error:', error);
            alert("ફોર્મ રદ કરવામાં કોઈ ભૂલ આવી છે.");
            cBtn.disabled = false; cBtn.innerHTML = "❌ ફોર્મ રદ (Cancel) કરો";
        });
    }

    function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const data = JSON.parse(localStorage.getItem("tempData"));
        const recNo = localStorage.getItem("currentReceiptNo") || "---";

        // Header Style
        doc.setFillColor(14, 30, 96); doc.rect(0, 0, 210, 45, 'F');
        doc.setTextColor(255); doc.setFontSize(20); doc.text("VRUNDAVANDHAM KHIRASARA", 105, 18, {align:"center"});
        doc.setFontSize(11); doc.text("SHREE SWAMINARAYAN GURUKUL", 105, 26, {align:"center"});
        doc.setFontSize(13); doc.text("ADMISSION RECEIPT (2026-27)", 105, 36, {align:"center"});
        doc.text("Receipt No: " + recNo, 195, 12, {align:"right"});

        // Photo on Receipt (હાઈ-ક્વોલિટી)
        if(data.photoData) {
            try { doc.addImage(data.photoData, 'JPEG', 160, 50, 35, 40); } catch(e) {}
        }

        doc.setTextColor(0); doc.setFontSize(12);
        let y = 65;
        const row = (l, v) => { 
            doc.setFont("helvetica", "bold"); doc.text(l + ":", 20, y); 
            doc.setFont("helvetica", "normal"); doc.text(String(v), 70, y); y += 11; 
        };

        row("Student Name", data.studentName);
        row("Grade", data.grade);
        row("Gender", data.gender);
        row("Admission Type", data.studentType);
        row("Caste", data.caste);
        row("Student Aadhar", data.aadhar);
        row("Father Name", data.fatherName);
        row("Mobile Number", data.mobile);
        row("Address", data.address);
        row("Date of Birth", data.dob);

        doc.save(`Admission_Receipt_${data.studentName}.pdf`);
    }

    function resetApp() { 
        if(confirm("નવું ફોર્મ ભરવા માટે જૂનો ડેટા સાફ થઈ જશે. શું તમે તૈયાર છો?")) {
            localStorage.clear(); 
            location.reload(); 
        }
    }
</script>
</body>
</html>
