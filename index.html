<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VSGK - પ્રવેશ ફોર્મ</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary: #0e1e60; --golden: #d4af37; --bg: #f1f5f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }

        /* Splash Screen */
        #splashScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; justify-content: center; align-items: center; z-index: 99999; }
        .splash-content { text-align: center; }
        .splash-emoji { font-size: 80px; }
        .splash-text { font-size: 28px; font-weight: bold; color: var(--primary); }

        /* General UI */
        .container { width: 100%; max-width: 900px; background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; margin-top: 20px; }
        .btn-main { width: 100%; max-width: 900px; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 50px; font-size: 19px; font-weight: bold; cursor: pointer; margin: 20px 0; }
        
        #statusBox { display: none; width: 100%; max-width: 600px; background: white; padding: 40px 20px; border-radius: 20px; text-align: center; margin: 40px 0; border: 2px solid var(--golden); }
        .btn-action { color: white; padding: 14px; border-radius: 10px; cursor: pointer; font-weight: bold; margin: 10px; width: 85%; border: none; }
        .btn-download { background: #059669; }
        .btn-cancel { background: #dc2626; }

        /* Form Details */
        #formSection { display: none; }
        .header-img { width: 100%; height: auto; border-bottom: 4px solid var(--golden); }
        .p-content { padding: 25px; }
        .section-bar { background: var(--primary); color: white; padding: 12px; border-radius: 8px; margin: 20px 0 10px 0; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .field { display: flex; flex-direction: column; margin-bottom: 12px; text-align: left; }
        label { font-size: 13px; font-weight: bold; margin-bottom: 5px; }
        input, select, textarea { padding: 11px; border: 1.5px solid #cbd5e1; border-radius: 8px; }
        
        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div id="splashScreen">
        <div class="splash-content">
            <div class="splash-emoji">🙏</div>
            <div class="splash-text">જય સ્વામિનારાયણ</div>
        </div>
    </div>

    <div id="statusBox">
        <h2 style="color: var(--primary);">તમારું ફોર્મ ભરાઈ ગયું છે! ✅</h2>
        <p>તમે આ ફોન પરથી એક જ વાર ફોર્મ ભરી શકો છો.</p>
        <button class="btn-action btn-download" onclick="downloadReceipt()">📄 રસીદ ડાઉનલોડ કરો</button>
        <hr>
        <button class="btn-action btn-cancel" onclick="handleCancel()">❌ એડમિશન રદ કરો અને નવું ભરો</button>
    </div>

    <div id="mainUI" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
        <button id="openBtn" class="btn-main" onclick="showForm()">લોકલ અને અપડાઉન પ્રવેશ ફોર્મ ભરવા અહીં ક્લિક કરો</button>

        <div id="formSection" class="container">
            <img src="header.jpeg" class="header-img">
            <div class="p-content">
                <form id="admissionForm">
                    <div class="section-bar">૧. વિદ્યાર્થીની વિગતો</div>
                    <div class="grid">
                        <div class="field"><label>વિદ્યાર્થીનું નામ</label><input type="text" id="uName" required></div>
                        <div class="field"><label>ધોરણ</label><input type="text" id="uGrade" required></div>
                        <div class="field"><label>જન્મ તારીખ</label><input type="text" id="uDob" placeholder="DD/MM/YYYY" required></div>
                        <div class="field"><label>મોબાઈલ નંબર</label><input type="tel" id="uMobile" maxlength="10" required></div>
                        <div class="field"><label>આધાર નંબર</label><input type="text" id="uAadhar" maxlength="12" required></div>
                        <div class="field">
                            <label>લિંગ</label>
                            <select id="uGender"><option>કુમાર</option><option>કન્યા</option></select>
                        </div>
                    </div>
                    <button type="submit" id="subBtn" class="btn-main">ફોર્મ સબમિટ કરો</button>
                </form>
            </div>
        </div>
    </div>

<script>
    const scriptURL = 'તમારી_APPS_SCRIPT_URL_અહીં_નાખો';

    window.onload = function() {
        setTimeout(() => { document.getElementById('splashScreen').style.display = 'none'; }, 1000);

        // ચેક કરો કે ફોર્મ પહેલેથી ભરેલું છે?
        if (localStorage.getItem("isSubmitted") === "true") {
            document.getElementById('statusBox').style.display = 'block';
            document.getElementById('mainUI').style.display = 'none';
        }
    };

    function showForm() {
        document.getElementById('formSection').style.display = 'block';
        document.getElementById('openBtn').style.display = 'none';
    }

    document.getElementById('admissionForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('subBtn');
        btn.disabled = true;
        btn.innerText = "સેવ થઈ રહ્યું છે...";

        const data = {
            action: "add",
            studentName: document.getElementById('uName').value,
            grade: document.getElementById('uGrade').value,
            dob: document.getElementById('uDob').value,
            mobile: document.getElementById('uMobile').value,
            aadhar: document.getElementById('uAadhar').value,
            gender: document.getElementById('uGender').value,
            // અન્ય વિગતો તમે ઉમેરી શકો છો...
        };

        try {
            const response = await fetch(scriptURL, { method: 'POST', body: JSON.stringify(data) });
            // LocalStorage માં સેવ કરો જેથી બીજી વાર ન ભરાય
            localStorage.setItem("isSubmitted", "true");
            localStorage.setItem("userData", JSON.stringify(data));
            
            alert("ફોર્મ સફળતાપૂર્વક ભરાઈ ગયું!");
            location.reload();
        } catch (err) {
            alert("ભૂલ થઈ, ફરી પ્રયાસ કરો.");
            btn.disabled = false;
        }
    });

    function downloadReceipt() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const d = JSON.parse(localStorage.getItem("userData"));

        doc.setFontSize(20);
        doc.text("Admission Receipt", 105, 20, {align: "center"});
        doc.setFontSize(12);
        doc.text(`Name: ${d.studentName}`, 20, 40);
        doc.text(`Aadhar: ${d.aadhar}`, 20, 50);
        doc.text(`Grade: ${d.grade}`, 20, 60);
        doc.text(`Mobile: ${d.mobile}`, 20, 70);
        
        doc.save("Receipt.pdf");
    }

    async function handleCancel() {
        if (confirm("શું તમે ખરેખર એડમિશન રદ કરવા માંગો છો?")) {
            const d = JSON.parse(localStorage.getItem("userData"));
            await fetch(scriptURL, { 
                method: 'POST', 
                body: JSON.stringify({ action: "cancel", aadhar: d.aadhar }) 
            });
            localStorage.clear();
            alert("એડમિશન રદ થયું. હવે તમે નવું ફોર્મ ભરી શકો છો.");
            location.reload();
        }
    }
</script>
</body>
</html>
