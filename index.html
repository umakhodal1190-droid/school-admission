<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Admission - Vrundavandham</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary: #0e1e60; --golden: #d4af37; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        
        .info-title { width: 100%; max-width: 900px; color: var(--primary); font-size: 18px; font-weight: 700; margin: 15px 0 10px 0; border-left: 5px solid var(--golden); padding-left: 10px; text-align: left; }
        .pdf-box { width: 100%; max-width: 900px; height: 350px; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 20px; background: white; }
        
        .btn-main { width: 100%; max-width: 900px; padding: 20px; background: linear-gradient(135deg, var(--primary), #1a3c8e); color: white; border: none; border-radius: 50px; font-size: 20px; font-weight: 800; cursor: pointer; margin: 20px 0; box-shadow: 0 8px 20px rgba(14, 30, 96, 0.2); transition: 0.3s; display: block; }
        
        #statusBox { display: none; width: 100%; max-width: 600px; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; margin: 40px 0; border: 2px solid #e2e8f0; }
        .btn-action { color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; margin: 10px; font-size: 16px; }
        .btn-download { background: #10b981; }
        .btn-cancel { background: #64748b; }

        #formSection { display: none; width: 100%; max-width: 900px; background: #fff; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); overflow: hidden; margin-bottom: 50px; border: 1px solid #e2e8f0; }
        .header-img { width: 100%; height: auto; display: block; border-bottom: 4px solid var(--golden); }
        
        .form-main-title { color: var(--primary); text-align: center; font-size: 28px; margin-top: 20px; margin-bottom: 10px; font-weight: 800; }
        .title-underline { width: 100px; height: 4px; background: var(--golden); margin: 0 auto 25px auto; border-radius: 2px; }

        .p-content { padding: 25px; }
        .section-bar { background: var(--primary); color: white; padding: 12px; border-radius: 8px; margin: 25px 0 15px 0; font-weight: 600; text-align: left; }
        
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; text-align: left; }
        .field { display: flex; flex-direction: column; margin-bottom: 10px; }
        label { font-size: 14px; font-weight: 700; color: #475569; margin-bottom: 5px; }
        input, select, textarea { padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 15px; width: 100%; box-sizing: border-box; }
        
        .photo-upload-container { grid-column: span 1; display: flex; flex-direction: column; align-items: center; background: #f8fafc; padding: 15px; border-radius: 12px; border: 2px dashed #cbd5e1; }
        #preview { width: 110px; height: 130px; background: #fff; border: 1px solid #ddd; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; overflow: hidden; font-weight: bold; color: #94a3b8; }
        #preview img { width: 100%; height: 100%; object-fit: cover; }
        .file-label { background: var(--primary); color: white; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }

        .span-2 { grid-column: span 2; } .span-3 { grid-column: span 3; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } .span-2, .span-3 { grid-column: span 1; } }
    </style>
</head>
<body>

    <div class="info-title">૧. એડમિશન માહિતી</div>
    <iframe src="https://docs.google.com/viewer?url=https://umakhodal1190-droid.github.io/school-admission/Fees.pdf&embedded=true" class="pdf-box"></iframe>

    <div class="info-title">૨. VSGK માહિતી પત્રક</div>
    <iframe src="https://docs.google.com/viewer?url=https://umakhodal1190-droid.github.io/school-admission/VSGK.pdf&embedded=true" class="pdf-box"></iframe>

    <button id="mainOpenBtn" class="btn-main" onclick="toggleForm()">સ્કૂલ પ્રવેશ ફોર્મ ભરવા માટે અહીં ક્લિક કરો</button>

    <div id="statusBox">
        <h2 style="color: var(--primary);">તમારું એડમિશન ફોર્મ ભરાઈ ગયું છે! ✅</h2>
        <button class="btn-action btn-download" onclick="downloadReceipt()">📄 PDF ડાઉનલોડ કરો</button>
        <button class="btn-action btn-cancel" onclick="handleCancel()">❌ કેન્સલ કરો</button>
    </div>

    <div id="formSection">
        <img src="header.jpeg" class="header-img">
        <div class="p-content">
            <h2 class="form-main-title">શૈક્ષણિક પ્રવેશ ફોર્મ</h2>
            <div class="title-underline"></div>

            <form id="admissionForm">
                <input type="hidden" name="action" value="add">
                
                <div class="grid">
                    <div class="photo-upload-container">
                        <div id="preview">ફોટો</div>
                        <label class="file-label" for="photoFile">ફોટો પસંદ કરો</label>
                        <input type="file" id="photoFile" accept="image/*" onchange="loadFile(event)" style="display: none;" required>
                    </div>
                    <div class="field span-2">
                        <label>વિદ્યાર્થીનું પૂરું નામ</label>
                        <input type="text" id="uName" name="studentName" required>
                    </div>
                </div>

                <div class="section-bar">૧. પ્રવેશ વિગતો</div>
                <div class="grid">
                    <div class="field"><label>ધોરણ</label><input type="text" id="uGrade" name="grade" required></div>
                    <div class="field">
                        <label>લિંગ (Gender)</label>
                        <select id="uGender" name="gender" required>
                            <option value="Male">કુમાર</option>
                            <option value="Female">કન્યા</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>જ્ઞાતિ (Caste)</label>
                        <select id="uCaste" name="caste" required>
                            <option value="Open">Open</option>
                            <option value="Baxi">Baxi</option>
                            <option value="SC">SC</option>
                            <option value="ST">ST</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>પ્રકાર (Type)</label>
                        <select id="uType" name="studentType" required>
                            <option value="Local">Local (લોકલ)</option>
                            <option value="Up-Down">Up-Down (અપડાઉન)</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>જન્મ તારીખ</label>
                        <input type="date" id="uDob" name="dob" required>
                    </div>
                    <div class="field"><label>આધાર કાર્ડ નંબર</label><input type="text" id="uAadhar" name="aadhar" maxlength="12" required></div>
                </div>

                <div class="section-bar">૨. વાલીની વિગત</div>
                <div class="grid">
                    <div class="field span-2"><label>પિતાનું પૂરું નામ</label><input type="text" id="uFather" name="fatherName" required></div>
                    <div class="field"><label>મોબાઈલ નંબર</label><input type="tel" id="uMobile" name="mobile" maxlength="10" required></div>
                    <div class="field span-3"><label>સરનામું</label><textarea id="uAddress" name="address" rows="2" required></textarea></div>
                </div>

                <button type="submit" id="submitBtn" class="btn-main">સબમિટ કરો</button>
            </form>
        </div>
    </div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyauyu_OnhiGEhpoWZovKjOQ59eFmN07PGKOrghWPwOgESI600J5uOXcg9FsO79wGRl/exec';

    window.onload = function() {
        if (localStorage.getItem("formSubmitted") === "true") {
            document.getElementById('statusBox').style.display = 'block';
            document.getElementById('mainOpenBtn').style.display = 'none';
        }
    };

    function toggleForm() {
        document.getElementById('formSection').style.display = 'block';
        document.getElementById('mainOpenBtn').style.display = 'none';
    }

    function loadFile(e) {
        if(e.target.files[0]) {
            document.getElementById('preview').innerHTML = '<img id="savedPhoto" src="' + URL.createObjectURL(e.target.files[0]) + '">';
        }
    }

    document.getElementById('admissionForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true; btn.innerHTML = "સેવ થઈ રહ્યું છે...";

        const photo = document.getElementById('savedPhoto');
        if(!photo) { alert("કૃપા કરીને ફોટો અપલોડ કરો"); btn.disabled = false; btn.innerHTML = "સબમિટ કરો"; return; }
        
        const canvas = document.createElement('canvas');
        canvas.width = photo.naturalWidth; canvas.height = photo.naturalHeight;
        canvas.getContext('2d').drawImage(photo, 0, 0);
        const photoBase64 = canvas.toDataURL('image/jpeg');

        const formData = new FormData(this);

        fetch(scriptURL, { method: 'POST', body: formData })
            .then(res => {
                const data = {
                    name: document.getElementById('uName').value,
                    grade: document.getElementById('uGrade').value,
                    gender: document.getElementById('uGender').value,
                    caste: document.getElementById('uCaste').value,
                    type: document.getElementById('uType').value,
                    dob: document.getElementById('uDob').value,
                    aadhar: document.getElementById('uAadhar').value,
                    father: document.getElementById('uFather').value,
                    mobile: document.getElementById('uMobile').value,
                    address: document.getElementById('uAddress').value,
                    photo: photoBase64
                };
                localStorage.setItem("formSubmitted", "true");
                localStorage.setItem("studentData", JSON.stringify(data));
                alert("ફોર્મ સફળતાપૂર્વક સબમિટ થઈ ગયું છે!");
                location.reload();
            })
            .catch(err => { alert("ભૂલ આવી!"); btn.disabled = false; btn.innerHTML = "સબમિટ કરો"; });
    });

    function downloadReceipt() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const data = JSON.parse(localStorage.getItem("studentData"));

        doc.setFillColor(14, 30, 96); doc.rect(0, 0, 210, 40, 'F');
        doc.setTextColor(212, 175, 55); doc.setFontSize(22); doc.text("VRUNDAVANDHAM KHIRASARA", 105, 20, { align: "center" });
        doc.setTextColor(255, 255, 255); doc.setFontSize(10); doc.text("Admission Receipt 2026-27", 105, 30, { align: "center" });

        doc.setDrawColor(0); doc.rect(10, 45, 190, 230);
        if(data.photo) doc.addImage(data.photo, 'JPEG', 160, 50, 30, 35);

        doc.setTextColor(0); doc.setFontSize(12);
        let y = 60;
        const items = [
            ["નામ", data.name], ["ધોરણ", data.grade], ["લિંગ", data.gender],
            ["જ્ઞાતિ", data.caste], ["પ્રકાર", data.type], ["જન્મ તારીખ", data.dob], 
            ["આધાર", data.aadhar], ["પિતાનું નામ", data.father], ["મોબાઈલ", data.mobile], 
            ["સરનામું", data.address]
        ];

        items.forEach(item => {
            doc.setFont("", "bold"); doc.text(item[0] + " :", 20, y);
            doc.setFont("", "normal"); doc.text(item[1], 60, y);
            y += 11;
        });

        doc.setFont("", "bold");
        doc.text("Principal Signature", 160, 250);
        doc.save(`Receipt_${data.name}.pdf`);
    }

    function handleCancel() {
        if(confirm("શું તમે ખરેખર એડમિશન કેન્સલ કરવા માંગો છો?")) { localStorage.clear(); location.reload(); }
    }
</script>
</body>
</html>
