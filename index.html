<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VSGK - પ્રવેશ ફોર્મ</title>
    <style>
        :root { --primary: #0e1e60; --golden: #d4af37; --bg: #f1f5f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; transition: 0.5s; }
        
        .container { width: 100%; max-width: 800px; background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; margin-top: 20px; display: none; }
        .header-img { width: 100%; height: auto; display: block; border-bottom: 4px solid var(--golden); }
        .form-body { padding: 25px; }
        
        .section-bar { background: var(--primary); color: white; padding: 12px; border-radius: 8px; margin: 20px 0 10px 0; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .field { display: flex; flex-direction: column; margin-bottom: 12px; }
        label { font-size: 13px; font-weight: bold; margin-bottom: 5px; color: #444; }
        input, select, textarea { padding: 11px; border: 1.5px solid #cbd5e1; border-radius: 8px; font-size: 14px; }

        .btn-submit { background: var(--primary); color: white; padding: 16px; border: none; width: 100%; border-radius: 50px; font-size: 18px; cursor: pointer; font-weight: bold; margin-top: 20px; transition: 0.3s; }
        .btn-submit:disabled { background: #ccc; }
        
        #status-box { display: none; text-align: center; padding: 50px; background: white; border-radius: 15px; margin-top: 20px; width: 100%; max-width: 800px; }
        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div style="font-size: 60px;">🙏</div>
        <div style="font-size: 24px; font-weight: bold; color: var(--primary);">જય સ્વામિનારાયણ</div>
    </div>

    <button id="openBtn" style="padding: 18px; width: 100%; max-width: 800px; background: var(--primary); color: white; border: none; border-radius: 50px; font-size: 17px; font-weight: bold; cursor: pointer;" onclick="showForm()">લોકલ અને અપડાઉન પ્રવેશ ફોર્મ ભરવા અહીં ક્લિક કરો</button>

    <div id="form-container" class="container">
        <img src="header.jpeg" class="header-img">
        <div class="form-body">
            <form id="admissionForm">
                <div class="section-bar">૧. વિદ્યાર્થીની વિગતો</div>
                <div class="field">
                    <label>વિદ્યાર્થીનું પૂરું નામ (
