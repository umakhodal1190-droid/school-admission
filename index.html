<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>પ્રવેશ ફોર્મ - VRUNDAVANDHAM KHIRASARA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary: #0e1e60; --golden: #d4af37; --bg: #f1f5f9; --success: #16a34a; --danger: #dc2626; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        
        #splashScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; justify-content: center; align-items: center; z-index: 99999; }
        
        .info-title { width: 100%; max-width: 900px; color: var(--primary); font-size: 18px; font-weight: 700; margin: 15px 0 10px 0; border-left: 5px solid var(--golden); padding-left: 10px; text-align: left; }
        .pdf-box { width: 100%; max-width: 900px; height: 350px; border-radius: 12px; border: 1px solid #cbd5e1; margin-bottom: 20px; background: white; }

        #statusBox { display: none; width: 100%; max-width: 600px; background: white; padding: 30px; border-radius: 20px; text-align: center; margin: 40px 0; border: 2px solid var(--golden); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .status-indicator { padding: 15px; border-radius: 12px; margin-bottom: 20px; font-weight: bold; font-size: 18px; }
        
        .btn-action { color: white; border: none; padding: 15px; border-radius: 12px; cursor: pointer; font-weight: bold; margin: 10px 0; font-size: 16px; width: 100%; display: block; text-decoration: none; }
        .btn-download { background: var(--success); } 
        .btn-cancel { background: var(--danger); }
        .btn-new { background: #64748b; }

        #formSection { display: none; width: 100%; max-width: 900px; background: #fff; border-radius: 15px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); overflow: hidden; margin-bottom: 50px; }
        .header-img { width: 100%; height: auto; display: block; border-bottom: 4px solid var(--golden); }
        .p-content { padding: 25px; }
        .section-bar { background: var(--primary); color: white; padding: 12px; border-radius: 8px; margin: 20px 0 15px 0; font-weight: 600; text-align: left; }
        
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .field { display: flex; flex-direction: column; text-align: left; }
        label { font-size: 13px; font-weight: 700; color: #334155; margin-bottom: 5px; }
        input, select, textarea { padding: 12px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 14px; width: 100%; box-sizing: border-box; }
        
        .photo-container { grid-column: span 1; display: flex; flex-direction: column; align-items: center; background: #f8fafc; padding: 15px; border-radius: 12px; border: 2px dashed #cbd5e1; }
        #preview { width: 110px; height: 130px; background: #fff; border: 1px solid #e2e8f0; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #preview img { width: 100%; height: 100%; object-fit: cover; }
        
        .btn-submit { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 30px; }
        
        .span-2 { grid-column: span 2; } .span-3 { grid-column: span 3; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } .span-2, .span-3 { grid-column: span 1; } }
    </style>
</head>
<body>

    <div id="splashScreen"><h2>🙏 જય સ્વામિનારાયણ</h2></div>

    <div id="mainView" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
        <div class="info-title">૧. ફી માળખું</div>
        <iframe src="https://docs.google.com/viewer?url=https://umakhodal1190-droid.github.io/school-admission/Fees.pdf&embedded=true" class="pdf-box"></iframe>
        
        <div class="info-title">૨. VSGK માહિતી પત્રક</div> 
        <iframe src="https://docs.google.com/viewer?url=https://umakhodal1190-droid.github.io/school-admission/VSGK.pdf&embedded=true" class="pdf-box"></iframe>
        
        <button id="mainOpenBtn" class="btn-submit" style="max-width: 500px; margin-bottom: 40px;" onclick="toggleForm()">લોકલ અને અપડાઉન પ્રવેશ ફોર્મ ભરવા અહીં ક્લિક કરો</button>
    </div>

    <div id="statusBox">
        <div id="statusIndicator" class="status-indicator"></div>
        <p id="receiptMsg">તમારો ડેટા સુરક્ષિત રીતે સેવ કરવામાં આવ્યો છે.</p>
        <button class="btn-action btn-download" onclick="generatePDF()">📄 પ્રવેશ રસીદ (PDF) ડાઉનલોડ કરો</button>
        <button id="cancelBtn" class="btn-action btn-cancel" onclick="handleCancel()">❌ એડમિશન રદ કરો</button>
        <button id="newFormBtn" class="btn-action btn-new" style="display:none;" onclick="resetApp()">➕ નવું ફોર્મ ભરો</button>
    </div>

    <div id="formSection">
        <img src="header.jpeg" class="header-img">
        <div class="p-content">
            <h2 style="text-align:center; color:var(--primary);">લોકલ અને અપડાઉન પ્રવેશ ફોર્મ</h2>
            <form id="admissionForm">
                <div class="grid">
                    <div class="photo-container">
                        <div id="preview">ફોટો</div>
                        <label style="background:var(--primary); color:white; padding:5px 10px; border-radius:5px; cursor:pointer; font-size: 12px;">
                            અપલોડ <input type="file" id="photoFile" accept="image/*" onchange="loadFile(event)" style="display:none;">
                        </label>
                    </div>
                    <div class="field span-2">
                        <label>વિદ્યાર્થીનું પૂરું નામ (અટક પ્રથમ)</label>
                        <input type="text" id="uName" placeholder="અટક નામ પિતાનું નામ" required>
                    </div>
                </div>

                <div class="section-bar">૧. પ્રવેશ વિગતો</div>
                <div class="grid">
                    <div class="field"><label>ધોરણ</label><input type="text" id="uGrade" required></div>
                    <div class="field"><label>લિંગ</label><select id="uGender"><option value="કુમાર">કુમાર</option><option value="કન્યા">કન્યા</option></select></div>
                    <div class="field"><label>જ્ઞાતિ</label><select id="uCaste"><option value="Open">Open</option><option value="OBC">OBC</option><option value="SC">SC</option><option value="ST">ST</option></select></div>
                    <div class="field"><label>પ્રવેશ પ્રકાર</label><select id="uType"><option value="Local(લોકલ)">Local(લોકલ)</option><option value="Up-Down(અપડાઉન)">Up-Down(અપડાઉન)</option></select></div>
                    <div class="field"><label>જન્મ તારીખ</label><input type="text" id="uDob" placeholder="DD/MM/YYYY" required></div>
                    <div class="field"><label>મોબાઈલ નંબર</label><input type="tel" id="uMobile" maxlength="10" required></div>
                    <div class="field"><label>આધાર નંબર</label><input type="text" id="uAadhar" maxlength="12" required></div>
                </div>

                <div class="section-bar">૨. ડોક્યુમેન્ટ અપલોડ</div>
                <div class="grid">
                    <div class="field span-2"><label>વિદ્યાર્થી આધાર કાર્ડ</label><input type="file" id="uAadharFile" accept="image/*" required></div>
                    <div class="field span-2"><label>પિતાનું આધાર કાર્ડ</label><input type="file" id="uFatherAadharFile" accept="image/*" required></div>
                </div>

                <div class="section-bar">૩. વાલીની વિગત</div>
                <div class="grid">
                    <div class="field span-2"><label>પિતાનું પૂરું નામ</label><input type="text" id="uFather" required></div>
                    <div class="field"><label>પિતાનો આધાર નંબર</label><input type="text" id="uFatherAadhar" maxlength="12" required></div>
                    <div class="field span-3"><label>સરનામું</label><textarea id="uAddress" rows="2" required></textarea></div>
                </div>

                <button type="submit" id="submitBtn" class="btn-submit">ફોર્મ સબમિટ કરો</button>
            </form>
        </div>
    </div>

<script>
    // તમારી નવી URL અહીં મૂકી છે
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyqMmLNS5O98rLx4oIU42ZD1x_oSy2m_g-6liha1yq11dUU43aduqpUw_KoDFnm5cKV/exec';
    const dbName = "VrundavandhamDB";

    async function initDB() {
        return new Promise((res) => {
            const req = indexedDB.open(dbName, 1);
            req.onupgradeneeded = (e) => e.target.result.createObjectStore("store");
            req.onsuccess = (e) => res(e.target.result);
        });
    }

    window.onload = function() {
        setTimeout(() => document.getElementById('splashScreen').style.display = 'none', 1000);
        if (localStorage.getItem("submitted") === "true") showStatus();
    };

    function toggleForm() { 
        document.getElementById('formSection').style.display = 'block'; 
        document.getElementById('mainView').style.display = 'none'; 
    }

    function showStatus() {
        document.getElementById('statusBox').style.display = 'block';
        document.getElementById('mainView').style.display = 'none';
        document.getElementById('formSection').style.display = 'none';
        const status = localStorage.getItem("status") || "Confirmed";
        const indicator = document.getElementById('statusIndicator');
        if(status === "Cancelled") {
            indicator.innerHTML = "❌ એડમિશન રદ કરેલ છે (Cancelled)";
            indicator.style.background = "#fee2e2"; indicator.style.color = "#dc2626";
            document.getElementById('cancelBtn').style.display = "none";
            document.getElementById('newFormBtn').style.display = "block";
        } else {
            indicator.innerHTML = "✅ એડમિશન કન્ફર્મ છે (Confirmed)";
            indicator.style.background = "#dcfce7"; indicator.style.color = "#16a34a";
        }
    }

    function loadFile(e) { if(e.target.files[0]) document.getElementById('preview').innerHTML = `<img id="studentImg" src="${URL.createObjectURL(e.target.files[0])}">`; }

    // ફોટાને નાનો કરીને મોકલવા માટેનું ફંક્શન
    async function toBase64(file) {
        return new Promise((res) => {
            const r = new FileReader();
            r.readAsDataURL(file);
            r.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const maxWidth = 500; // ફોટાની પહોળાઈ ફિક્સ કરી
                    const scale = maxWidth / img.width;
                    canvas.width = maxWidth;
                    canvas.height = img.height * scale;
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    res(canvas.toDataURL('image/jpeg', 0.7)); // 70% ક્વોલિટી સાથે સેવ થશે
                };
            };
        });
    }

    document.getElementById('admissionForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true; btn.innerHTML = "સેવ થઈ રહ્યું છે...";

        const img = document.getElementById('studentImg');
        let photoBase = "";
        if(img) {
            const canvas = document.createElement('canvas');
            canvas.width = 150; canvas.height = 180;
            canvas.getContext('2d').drawImage(img, 0, 0, 150, 180);
            photoBase = canvas.toDataURL('image/jpeg', 0.8);
        }

        const data = {
            action: "add",
            studentName: document.getElementById('uName').value,
            grade: document.getElementById('uGrade').value,
            gender: document.getElementById('uGender').value,
            caste: document.getElementById('uCaste').value,
            studentType: document.getElementById('uType').value,
            dob: document.getElementById('uDob').value,
            aadhar: document.getElementById('uAadhar').value,
            mobile: document.getElementById('uMobile').value,
            fatherName: document.getElementById('uFather').value,
            fatherAadhar: document.getElementById('uFatherAadhar').value,
            address: document.getElementById('uAddress').value,
            photoData: photoBase,
            studentAadharData: await toBase64(document.getElementById('uAadharFile').files[0]),
            fatherAadharData: await toBase64(document.getElementById('uFatherAadharFile').files[0])
        };

        const db = await initDB();
        db.transaction("store", "readwrite").objectStore("store").put(data, "studentData");

        // JSONP રિક્વેસ્ટ
        const finalURL = scriptURL + "?callback=ctrlRes&action=add&data=" + encodeURIComponent(JSON.stringify(data));
        const script = document.createElement('script'); 
        script.src = finalURL; 
        document.body.appendChild(script);
    });

    window.ctrlRes = function(res) { 
        if(res.status === "Success") { 
            localStorage.setItem("submitted", "true"); 
            localStorage.setItem("status", "Confirmed"); 
            location.reload(); 
        } else {
            alert("Error: " + res.message);
            document.getElementById('submitBtn').disabled = false;
            document.getElementById('submitBtn').innerHTML = "ફોર્મ સબમિટ કરો";
        }
    };

    async function handleCancel() {
        if(confirm("શું તમે આ એડમિશન રદ કરવા માંગો છો?")) {
            const db = await initDB();
            const req = db.transaction("store").objectStore("store").get("studentData");
            req.onsuccess = () => {
                const cancelURL = scriptURL + "?callback=cancelRes&action=cancel&aadhar=" + req.result.aadhar;
                const script = document.createElement('script'); script.src = cancelURL; document.body.appendChild(script);
            };
        }
    }

    window.cancelRes = function(res) { if(res.status === "Updated") { localStorage.setItem("status", "Cancelled"); location.reload(); } };

    function resetApp() { localStorage.clear(); indexedDB.deleteDatabase(dbName); location.reload(); }

    async function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const db = await initDB();
        const data = await new Promise(res => { const req = db.transaction("store").objectStore("store").get("studentData"); req.onsuccess = () => res(req.result); });

        doc.setFillColor(14, 30, 96); doc.rect(0, 0, 210, 40, 'F');
        doc.setTextColor(255); doc.setFontSize(22); doc.text("VRUNDAVANDHAM KHIRASARA", 105, 18, {align:"center"});
        doc.setFontSize(12); doc.text("Admission Receipt : 2026-27", 105, 28, {align:"center"});

        if(data.photoData) doc.addImage(data.photoData, 'JPEG', 160, 45, 35, 42);

        doc.setTextColor(0); doc.setFontSize(11);
        let y = 55;
        const info = [
            ["વિદ્યાર્થીનું નામ", data.studentName], ["ધોરણ", data.grade], ["લિંગ", data.gender],
            ["જ્ઞાતિ", data.caste], ["પ્રવેશ પ્રકાર", data.studentType], ["જન્મ તારીખ", data.dob],
            ["આધાર નંબર", data.aadhar], ["મોબાઈલ નંબર", data.mobile], ["પિતાનું નામ", data.fatherName],
            ["પિતાનો આધાર", data.fatherAadhar], ["સરનામું", data.address], ["સ્ટેટસ", localStorage.getItem("status") || "Confirmed"]
        ];

        info.forEach(row => {
            doc.setFont(undefined, 'bold'); doc.text(row[0] + ":", 20, y);
            doc.setFont(undefined, 'normal'); doc.text(String(row[1]), 65, y);
            y += 10;
        });

        y += 5;
        doc.setFont(undefined, 'bold'); doc.text("ડોક્યુમેન્ટ્સ:", 20, y);
        if(data.studentAadharData) doc.addImage(data.studentAadharData, 'JPEG', 20, y+5, 80, 50);
        if(data.fatherAadharData) doc.addImage(data.fatherAadharData, 'JPEG', 110, y+5, 80, 50);

        doc.save(`Admission_${data.studentName}.pdf`);
    }
</script>
</body>
</html>
