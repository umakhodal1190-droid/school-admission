<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Admission - Vrundavandham</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary: #0e1e60; --secondary: #a31d24; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        
        .info-title { width: 100%; max-width: 900px; color: var(--primary); font-size: 18px; font-weight: 700; margin: 15px 0 10px 0; border-left: 5px solid var(--secondary); padding-left: 10px; text-align: left; }
        .pdf-box { width: 100%; max-width: 900px; height: 350px; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 20px; background: white; }
        
        /* મુખ્ય બટન */
        .btn-main { width: 100%; max-width: 900px; padding: 20px; background: var(--secondary); color: white; border: none; border-radius: 50px; font-size: 20px; font-weight: 800; cursor: pointer; margin: 20px 0; box-shadow: 0 8px 20px rgba(163,29,36,0.3); display: block; }
        
        #statusBox { display: none; width: 100%; max-width: 600px; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; margin: 40px 0; border: 2px solid #e2e8f0; }
        .btn-green { background: #10b981; color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; margin: 10px; }
        .btn-gray { background: #64748b; color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; margin: 10px; }

        #formSection { display: none; width: 100%; max-width: 900px; background: #fff; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); overflow: hidden; margin-bottom: 50px; border: 1px solid #e2e8f0; }
        .header-img { width: 100%; height: auto; display: block; border-bottom: 4px solid var(--secondary); }
        .p-content { padding: 25px; }
        .section-bar { background: var(--primary); color: white; padding: 12px; border-radius: 8px; margin: 25px 0 15px 0; font-weight: 600; text-align: left; }
        
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; text-align: left; }
        .field { display: flex; flex-direction: column; margin-bottom: 10px; }
        label { font-size: 14px; font-weight: 700; color: #475569; margin-bottom: 5px; }
        input, select, textarea { padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 15px; width: 100%; box-sizing: border-box; }
        
        .photo-container { grid-column: span 1; display: flex; flex-direction: column; align-items: center; background: #f8fafc; padding: 15px; border-radius: 12px; border: 2px dashed #cbd5e1; }
        #preview { width: 110px; height: 130px; background: #fff; border: 1px solid #ddd; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; overflow: hidden; color: #94a3b8; font-size: 12px; }
        #preview img { width: 100%; height: 100%; object-fit: cover; }

        .span-2 { grid-column: span 2; } .span-3 { grid-column: span 3; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } .span-2, .span-3 { grid-column: span 1; } }
    </style>
</head>
<body>

    <div class="info-title">૧. એડમિશન માહિતી</div>
    <iframe src="https://docs.google.com/viewer?url=https://umakhodal1190-droid.github.io/school-admission/Fees.pdf&embedded=true" class="pdf-box"></iframe>

    <div class="info-title">૨. VSGK માહિતી પત્રક</div>
    <iframe src="https://docs.google.com/viewer?url=https://umakhodal1190-droid.github.io/school-admission/VSGK.pdf&embedded=true" class="pdf-box"></iframe>

    <button id="mainOpenBtn" class="btn-main" onclick="openAdmissionForm()">સ્કૂલ પ્રવેશ ફોર્મ ભરવા માટે અહીં ક્લિક કરો</button>

    <div id="statusBox">
        <h2 style="color: var(--primary);">તમારું એડમિશન ફોર્મ ભરાઈ ગયું છે! ✅</h2>
        <button class="btn-green" onclick="downloadReceipt()">📄 Receipt PDF ડાઉનલોડ કરો</button>
        <button class="btn-gray" onclick="cancelAdmission()">❌ કેન્સલ કરો</button>
    </div>

    <div id="formSection">
        <img src="header.jpeg" class="header-img">
        <div class="p-content">
            <h2 style="color:var(--secondary); text-align: center; margin-bottom: 25px;">શૈક્ષણિક પ્રવેશ ફોર્મ</h2>
            
            <form id="admissionForm">
                <input type="hidden" name="action" value="add">
                
                <div class="grid">
                    <div class="photo-container">
                        <div id="preview">વિદ્યાર્થી ફોટો</div>
                        <input type="file" id="photoInput" accept="image/*" onchange="showPreview(event)" style="font-size: 10px; width: 100%;" required>
                    </div>
                    <div class="field span-2">
                        <label>વિદ્યાર્થીનું પૂરું નામ (અટક-નામ-પિતાનું નામ)</label>
                        <input type="text" id="uName" name="studentName" placeholder="નામ લખો" required>
                    </div>
                </div>

                <div class="section-bar">૧. શૈક્ષણિક અને વ્યક્તિગત વિગત</div>
                <div class="grid">
                    <div class="field"><label>ધોરણ</label><input type="text" id="uGrade" name="grade" required></div>
                    <div class="field">
                        <label>લિંગ (Gender)</label>
                        <select name="gender" required>
                            <option value="">પસંદ કરો</option>
                            <option value="Male">કુમાર (Male)</option>
                            <option value="Female">કન્યા (Female)</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>જ્ઞાતિ (Caste)</label>
                        <select name="caste" required>
                            <option value="Open">Open</option>
                            <option value="Baxi">Baxi</option>
                            <option value="SC">SC</option>
                            <option value="ST">ST</option>
                        </select>
                    </div>
                    <div class="field"><label>જન્મ તારીખ</label><input type="date" name="dob" required></div>
                    <div class="field span-2"><label>આધાર કાર્ડ નંબર</label><input type="text" id="uAadhar" name="aadhar" maxlength="12" pattern="\d{12}" required></div>
                </div>

                <div class="section-bar">૨. વાલીની વિગત અને સરનામું</div>
                <div class="grid">
                    <div class="field span-2"><label>પિતાનું પૂરું નામ</label><input type="text" name="fatherName" required></div>
                    <div class="field"><label>મોબાઈલ નંબર</label><input type="tel" id="uMobile" name="mobile" maxlength="10" pattern="[0-9]{10}" required></div>
                    <div class="field span-3"><label>પૂરું સરનામું</label><textarea name="address" rows="3" required></textarea></div>
                </div>

                <button type="submit" id="submitBtn" class="btn-main" style="border-radius: 12px; margin-top: 20px;">સબમિટ કરો</button>
            </form>
        </div>
    </div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyauyu_OnhiGEhpoWZovKjOQ59eFmN07PGKOrghWPwOgESI600J5uOXcg9FsO79wGRl/exec';

    window.onload = function() {
        if (localStorage.getItem("formSubmitted") === "true") {
            document.getElementById('statusBox').style.display = 'block';
            document.getElementById('mainOpenBtn').style.display = 'none';
        }
    };

    function openAdmissionForm() {
        document.getElementById('formSection').style.display = 'block';
        document.getElementById('mainOpenBtn').style.display = 'none';
        document.getElementById('formSection').scrollIntoView({ behavior: 'smooth' });
    }

    function showPreview(e) {
        if(e.target.files[0]) {
            document.getElementById('preview').innerHTML = '<img src="' + URL.createObjectURL(e.target.files[0]) + '">';
        }
    }

    document.getElementById('admissionForm').addEventListener('submit', function(e) {
        e.preventDefault();
        if (!this.checkValidity()) { this.reportValidity(); return; }

        const btn = document.getElementById('submitBtn');
        btn.disabled = true; btn.innerHTML = "સેવ થઈ રહ્યું છે...";

        const userData = {
            name: document.getElementById('uName').value,
            grade: document.getElementById('uGrade').value,
            mobile: document.getElementById('uMobile').value,
            aadhar: document.getElementById('uAadhar').value
        };

        fetch(scriptURL, { method: 'POST', body: new FormData(this)})
            .then(res => {
                localStorage.setItem("formSubmitted", "true");
                localStorage.setItem("userData", JSON.stringify(userData));
                alert('ફોર્મ સફળતાપૂર્વક સબમિટ થઈ ગયું છે!');
                location.reload();
            })
            .catch(err => {
                alert('ભૂલ આવી!');
                btn.disabled = false; btn.innerHTML = "સબમિટ કરો";
            });
    });

    function downloadReceipt() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const data = JSON.parse(localStorage.getItem("userData"));

        if(!data) return alert("ડેટા મળ્યો નથી!");

        // હેડર બ્લુ બોક્સ
        doc.setFillColor(14, 30, 96);
        doc.rect(10, 10, 190, 30, 'F');
        
        doc.setFontSize(22);
        doc.setTextColor(255, 255, 255);
        doc.text("VRUNDAVANDHAM KHIRASARA", 105, 25, { align: "center" });
        
        doc.setFontSize(12);
        doc.text("Admission Receipt", 105, 33, { align: "center" });

        // વિગતો
        doc.setTextColor(0, 0, 0);
        doc.setFontSize(14);
        doc.setLineWidth(0.5);
        doc.line(15, 50, 195, 50);

        let y = 65;
        const details = [
            ["વિદ્યાર્થીનું નામ", data.name],
            ["ધોરણ", data.grade],
            ["મોબાઈલ નંબર", data.mobile],
            ["આધાર કાર્ડ નંબર", data.aadhar]
        ];

        details.forEach(item => {
            doc.text(item[0] + " : " + item[1], 20, y);
            y += 12;
        });

        doc.line(15, y, 195, y);
        doc.setFontSize(10);
        doc.text("Vrundavandham Education Trust, Khirasara", 105, 280, { align: "center" });

        doc.save(`Receipt_${data.name}.pdf`);
    }

    function cancelAdmission() {
        if(confirm("શું તમે ખરેખર કેન્સલ કરવા માંગો છો?")) {
            localStorage.clear();
            location.reload();
        }
    }
</script>

</body>
</html>
