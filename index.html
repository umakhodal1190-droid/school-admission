<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>પ્રવેશ ફોર્મ - VRUNDAVANDHAM KHIRASARA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary: #0e1e60; --golden: #d4af37; --bg: #f1f5f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .pdf-box { width: 100%; max-width: 900px; height: 350px; border-radius: 12px; border: 2px solid #cbd5e1; margin-bottom: 20px; background: white; }
        #statusBox { display: none; width: 100%; max-width: 600px; background: white; padding: 30px; border-radius: 20px; text-align: center; margin: 40px 0; border: 2px solid var(--golden); }
        #formSection { display: none; width: 100%; max-width: 900px; background: #fff; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; margin-bottom: 50px; }
        .p-content { padding: 25px; }
        .section-bar { background: var(--primary); color: white; padding: 12px; border-radius: 8px; margin: 20px 0 10px 0; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .field { display: flex; flex-direction: column; text-align: left; }
        label { font-size: 13px; font-weight: bold; margin-bottom: 5px; color: #444; }
        input, select { padding: 12px; border: 1px solid #ccc; border-radius: 8px; width: 100%; box-sizing: border-box; }
        .btn-submit { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .btn-cancel { background: #666; margin-top: 10px; }
        #preview { width: 110px; height: 130px; background: #eee; border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; overflow: hidden; margin-bottom: 10px; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div id="mainView" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
        <iframe src="https://docs.google.com/viewer?url=https://umakhodal1190-droid.github.io/school-admission/Fees.pdf&embedded=true" class="pdf-box"></iframe>
        <iframe src="https://docs.google.com/viewer?url=https://umakhodal1190-droid.github.io/school-admission/VSGK.pdf&embedded=true" class="pdf-box"></iframe>
        <button class="btn-submit" style="max-width: 400px;" onclick="toggleForm(true)">પ્રવેશ ફોર્મ ભરવા અહીં ક્લિક કરો</button>
    </div>

    <div id="statusBox">
        <h2 style="color: #16a34a;">✅ પ્રવેશ ફોર્મ સફળતાપૂર્વક સબમિટ થયું!</h2>
        <p>નીચેના બટન પર ક્લિક કરીને રસીદ સેવ કરી લો.</p>
        <button class="btn-submit" style="background: #16a34a;" onclick="generatePDF()">📄 રસીદ ડાઉનલોડ કરો</button>
        <button class="btn-submit" onclick="resetApp()">➕ નવું ફોર્મ ભરો</button>
    </div>

    <div id="formSection">
        <div class="p-content">
            <h2 style="text-align:center; color:var(--primary); margin-top:0;">લોકલ અને અપડાઉન પ્રવેશ ફોર્મ</h2>
            <form id="admissionForm">
                <div class="grid">
                    <div style="text-align: center;">
                        <div id="preview">વિદ્યાર્થી ફોટો</div>
                        <input type="file" accept="image/*" onchange="handleImg(event, 'preview', 'uPhotoData')" required>
                    </div>
                    <div class="field" style="grid-column: span 2;">
                        <label>વિદ્યાર્થીનું પૂરું નામ (અટક પ્રથમ)</label>
                        <input type="text" id="uName" placeholder="દા.ત. પટેલ આર્યન રાજેશભાઈ" required>
                    </div>
                </div>

                <div class="section-bar">૧. પ્રવેશ વિગતો</div>
                <div class="grid">
                    <div class="field"><label>ધોરણ</label><input type="text" id="uGrade" required></div>
                    <div class="field"><label>લિંગ</label><select id="uGender"><option>કુમાર</option><option>કન્યા</option></select></div>
                    <div class="field"><label>જ્ઞાતિ</label><select id="uCaste"><option>Open</option><option>OBC</option><option>SC</option><option>ST</option></select></div>
                    <div class="field"><label>પ્રવેશ પ્રકાર</label><select id="uType"><option>Local</option><option>Up-Down</option></select></div>
                    <div class="field"><label>આધાર નંબર</label><input type="text" id="uAadhar" maxlength="12" required></div>
                    <div class="field"><label>જન્મ તારીખ</label><input type="text" id="uDob" placeholder="DD/MM/YYYY" required></div>
                </div>

                <div class="section-bar">૨. ડોક્યુમેન્ટ અપલોડ</div>
                <div class="grid">
                    <div class="field" style="grid-column: span 1.5;"><label>વિદ્યાર્થી આધાર કાર્ડ (ફોટો)</label><input type="file" accept="image/*" onchange="handleImg(event, '', 'uAadharImgData')" required></div>
                    <div class="field" style="grid-column: span 1.5;"><label>પિતાનું આધાર કાર્ડ (ફોટો)</label><input type="file" accept="image/*" onchange="handleImg(event, '', 'uFatherImgData')" required></div>
                </div>

                <div class="section-bar">૩. વાલી વિગત</div>
                <div class="grid">
                    <div class="field" style="grid-column: span 2;"><label>પિતાનું પૂરું નામ</label><input type="text" id="uFather" required></div>
                    <div class="field"><label>પિતાનો આધાર નંબર</label><input type="text" id="uFatherAadhar" maxlength="12" required></div>
                    <div class="field"><label>મોબાઈલ નંબર</label><input type="tel" id="uMobile" maxlength="10" required></div>
                    <div class="field" style="grid-column: span 2;"><label>સરનામું</label><input type="text" id="uAddress" required></div>
                </div>

                <input type="hidden" id="uPhotoData"><input type="hidden" id="uAadharImgData"><input type="hidden" id="uFatherImgData">
                <button type="submit" id="submitBtn" class="btn-submit">સબમિટ કરો</button>
                <button type="button" class="btn-submit btn-cancel" onclick="toggleForm(false)">પાછા જાઓ (Cancel)</button>
            </form>
        </div>
    </div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxwpOSlSOgCSHjUFU0x90k2TLKS8l2eiho61QTx2vb7NxLZTnMIF3tONShQUvXfYjnS/exec';

    function toggleForm(show) {
        document.getElementById('formSection').style.display = show ? 'block' : 'none';
        document.getElementById('mainView').style.display = show ? 'none' : 'block';
        window.scrollTo(0,0);
    }

    async function handleImg(e, prevId, hiddenId) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (ev) => {
            document.getElementById(hiddenId).value = ev.target.result;
            if(prevId) document.getElementById(prevId).innerHTML = `<img src="${ev.target.result}" style="width:100%;height:100%;object-fit:cover;">`;
        };
    }

    document.getElementById('admissionForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true; btn.innerHTML = "માહિતી સેવ થઈ રહી છે...";

        const data = {
            studentName: document.getElementById('uName').value,
            grade: document.getElementById('uGrade').value,
            gender: document.getElementById('uGender').value,
            caste: document.getElementById('uCaste').value,
            studentType: document.getElementById('uType').value,
            aadhar: document.getElementById('uAadhar').value,
            fatherName: document.getElementById('uFather').value,
            fatherAadhar: document.getElementById('uFatherAadhar').value,
            mobile: document.getElementById('uMobile').value,
            address: document.getElementById('uAddress').value,
            dob: document.getElementById('uDob').value
        };

        localStorage.setItem("tempData", JSON.stringify(data));
        const script = document.createElement('script');
        script.src = scriptURL + "?callback=ctrlRes&data=" + encodeURIComponent(JSON.stringify(data));
        document.body.appendChild(script);
    });

    window.ctrlRes = function(res) {
        localStorage.setItem("done", "true");
        document.getElementById('formSection').style.display = 'none';
        document.getElementById('statusBox').style.display = 'block';
        generatePDF();
    };

    function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const data = JSON.parse(localStorage.getItem("tempData"));
        
        // --- રસીદની ડિઝાઇન ---
        doc.setFillColor(14, 30, 96); doc.rect(0, 0, 210, 40, 'F');
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(20); doc.text("VRUNDAVANDHAM KHIRASARA", 105, 18, {align:"center"});
        doc.setFontSize(12); doc.text("ADMISSION RECEIPT (2026-2027)", 105, 28, {align:"center"});
        
        doc.setTextColor(0, 0, 0);
        let startY = 55;
        let lineGap = 12;

        const printRow = (label, value, y) => {
            doc.setFont("helvetica", "bold");
            doc.text(label, 25, y);
            doc.setFont("helvetica", "normal");
            doc.text(": " + value, 70, y);
        };

        printRow("Student Name", data.studentName, startY);
        printRow("Grade", data.grade, startY + lineGap);
        printRow("Gender", data.gender, startY + lineGap * 2);
        printRow("Caste", data.caste, startY + lineGap * 3);
        printRow("Type", data.studentType, startY + lineGap * 4);
        printRow("Aadhar No.", data.aadhar, startY + lineGap * 5);
        printRow("Father Name", data.fatherName, startY + lineGap * 6);
        printRow("Father Aadhar", data.fatherAadhar, startY + lineGap * 7);
        printRow("Mobile No.", data.mobile, startY + lineGap * 8);
        printRow("Address", data.address, startY + lineGap * 9);
        printRow("Date of Birth", data.dob, startY + lineGap * 10);

        doc.setDrawColor(200); doc.line(20, startY + lineGap * 11, 190, startY + lineGap * 11);
        
        doc.setFontSize(10); doc.setTextColor(100);
        doc.text("Vrundavandham Shree Swaminarayan Gurukul - Khirasara", 105, startY + lineGap * 12, {align:"center"});
        doc.text("Generated on: " + new Date().toLocaleString(), 105, startY + lineGap * 13, {align:"center"});
        
        doc.save(`Receipt_${data.studentName}.pdf`);
    }

    function resetApp() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
