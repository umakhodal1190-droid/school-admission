<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>પ્રવેશ ફોર્મ - VRUNDAVANDHAM KHIRASARA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary: #0e1e60; --golden: #d4af37; --bg: #f1f5f9; --success: #16a34a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        #splashScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; justify-content: center; align-items: center; z-index: 99999; }
        .pdf-box { width: 100%; max-width: 900px; height: 350px; border-radius: 12px; border: 1px solid #cbd5e1; margin-bottom: 20px; background: white; }
        #statusBox { display: none; width: 100%; max-width: 600px; background: white; padding: 30px; border-radius: 20px; text-align: center; margin: 40px 0; border: 2px solid var(--golden); }
        #formSection { display: none; width: 100%; max-width: 900px; background: #fff; border-radius: 15px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); overflow: hidden; margin-bottom: 50px; }
        .header-img { width: 100%; height: auto; display: block; border-bottom: 4px solid var(--golden); }
        .p-content { padding: 25px; }
        .section-bar { background: var(--primary); color: white; padding: 12px; border-radius: 8px; margin: 20px 0 15px 0; font-weight: 600; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .field { display: flex; flex-direction: column; text-align: left; }
        label { font-size: 13px; font-weight: 700; color: #334155; margin-bottom: 5px; }
        input, select, textarea { padding: 12px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 14px; width: 100%; box-sizing: border-box; }
        .btn-submit { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 30px; }
        .span-2 { grid-column: span 2; } .span-3 { grid-column: span 3; }
        #preview { width: 110px; height: 130px; background: #eee; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid #ddd; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } .span-2, .span-3 { grid-column: span 1; } }
    </style>
</head>
<body>

    <div id="splashScreen"><h2>🙏 જય સ્વામિનારાયણ</h2></div>

    <div id="mainView" style="width: 100%; max-width: 900px; text-align: center;">
        <div class="pdf-box"><iframe src="https://docs.google.com/viewer?url=https://umakhodal1190-droid.github.io/school-admission/Fees.pdf&embedded=true" style="width:100%; height:100%; border:none;"></iframe></div>
        <button class="btn-submit" onclick="toggleForm()">પ્રવેશ ફોર્મ ભરવા અહીં ક્લિક કરો</button>
    </div>

    <div id="statusBox">
        <h2 style="color: var(--success);">✅ એડમિશન કન્ફર્મ!</h2>
        <p>રસીદ ડાઉનલોડ થઈ રહી છે...</p>
        <button class="btn-submit" onclick="resetApp()">નવું ફોર્મ ભરો</button>
    </div>

    <div id="formSection">
        <img src="header.jpeg" class="header-img">
        <div class="p-content">
            <form id="admissionForm">
                <div class="grid">
                    <div style="grid-column: span 1; text-align: center;">
                        <div id="preview">ફોટો</div>
                        <input type="file" id="photoFile" accept="image/*" onchange="loadFile(event, 'preview')" required>
                    </div>
                    <div class="field span-2">
                        <label>વિદ્યાર્થીનું પૂરું નામ</label>
                        <input type="text" id="uName" required>
                    </div>
                </div>

                <div class="section-bar">૧. પ્રવેશ વિગતો</div>
                <div class="grid">
                    <div class="field"><label>ધોરણ</label><input type="text" id="uGrade" required></div>
                    <div class="field"><label>લિંગ</label><select id="uGender"><option>કુમાર</option><option>કન્યા</option></select></div>
                    <div class="field"><label>જ્ઞાતિ</label><input type="text" id="uCaste" required></div>
                    <div class="field"><label>જન્મ તારીખ</label><input type="text" id="uDob" placeholder="DD/MM/YYYY" required></div>
                    <div class="field"><label>મોબાઈલ</label><input type="tel" id="uMobile" maxlength="10" required></div>
                    <div class="field"><label>આધાર નંબર</label><input type="text" id="uAadhar" maxlength="12" required></div>
                </div>

                <div class="section-bar">૨. ડોક્યુમેન્ટ અપલોડ</div>
                <div class="grid">
                    <div class="field span-2"><label>વિદ્યાર્થી આધાર કાર્ડ (ફોટો)</label><input type="file" id="uAadharFile" accept="image/*" onchange="compressImg(event, 'uAadharData')" required></div>
                    <div class="field span-2"><label>પિતાનું આધાર કાર્ડ (ફોટો)</label><input type="file" id="uFatherAadharFile" accept="image/*" onchange="compressImg(event, 'uFatherAadharData')" required></div>
                </div>

                <div class="section-bar">૩. વાલીની વિગત</div>
                <div class="grid">
                    <div class="field span-2"><label>પિતાનું નામ</label><input type="text" id="uFather" required></div>
                    <div class="field span-3"><label>સરનામું</label><textarea id="uAddress" required></textarea></div>
                </div>

                <input type="hidden" id="uAadharData">
                <input type="hidden" id="uFatherAadharData">
                <button type="submit" id="submitBtn" class="btn-submit">ફોર્મ સબમિટ કરો</button>
            </form>
        </div>
    </div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbw2tJSay79xu0H7pKWg1pc_KzsXreBP6H12nJWSzZ6RBOEhCgZysZfABzwp6f2zZEXN/exec';

    window.onload = () => {
        setTimeout(() => document.getElementById('splashScreen').style.display = 'none', 1000);
        if(localStorage.getItem("done") === "true") showStatus();
    };

    function toggleForm() { document.getElementById('formSection').style.display='block'; document.getElementById('mainView').style.display='none'; }
    function showStatus() { document.getElementById('statusBox').style.display='block'; document.getElementById('mainView').style.display='none'; }

    function loadFile(e, id) { 
        if(e.target.files[0]) document.getElementById(id).innerHTML = `<img src="${URL.createObjectURL(e.target.files[0])}" style="width:100%;height:100%;object-fit:cover;">`; 
    }

    async function compressImg(e, hiddenId) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (event) => {
            const img = new Image();
            img.src = event.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const width = 400; const scale = width / img.width;
                canvas.width = width; canvas.height = img.height * scale;
                canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                document.getElementById(hiddenId).value = canvas.toDataURL('image/jpeg', 0.5);
            };
        };
    }

    document.getElementById('admissionForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true; btn.innerHTML = "સેવ થઈ રહ્યું છે...";

        const data = {
            action: "add",
            studentName: document.getElementById('uName').value,
            grade: document.getElementById('uGrade').value,
            gender: document.getElementById('uGender').value,
            caste: document.getElementById('uCaste').value,
            dob: document.getElementById('uDob').value,
            aadhar: document.getElementById('uAadhar').value,
            mobile: document.getElementById('uMobile').value,
            fatherName: document.getElementById('uFather').value,
            address: document.getElementById('uAddress').value,
            // ફોટાઓ (Base64)
            photoData: document.getElementById('uAadharData').value, 
            studentAadhar: document.getElementById('uAadharData').value,
            fatherAadhar: document.getElementById('uFatherAadharData').value
        };

        localStorage.setItem("tempData", JSON.stringify(data));
        const finalURL = scriptURL + "?callback=ctrlRes&action=add&data=" + encodeURIComponent(JSON.stringify(data));
        const script = document.createElement('script');
        script.src = finalURL;
        document.body.appendChild(script);
    });

    window.ctrlRes = function(res) {
        if(res.status === "Success") {
            generatePDF();
            localStorage.setItem("done", "true");
            location.reload();
        } else { alert("ભૂલ: " + res.message); }
    };

    function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const data = JSON.parse(localStorage.getItem("tempData"));
        doc.text("Admission Receipt - 2026", 10, 10);
        doc.text("Name: " + data.studentName, 10, 20);
        doc.text("Grade: " + data.grade, 10, 30);
        doc.text("Mobile: " + data.mobile, 10, 40);
        doc.save(`Receipt_${data.studentName}.pdf`);
    }

    function resetApp() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
