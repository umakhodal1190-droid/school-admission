<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Admission - Vrundavandham</title>
    <style>
        :root { --primary: #0e1e60; --secondary: #a31d24; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .info-title { width: 100%; max-width: 900px; color: var(--primary); font-size: 20px; font-weight: 700; margin: 20px 0 10px 0; border-left: 5px solid var(--secondary); padding-left: 10px; text-align: left; }
        .pdf-box { width: 100%; max-width: 900px; height: 450px; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 20px; background: white; }
        .show-form-btn { width: 100%; max-width: 900px; padding: 20px; background: var(--secondary); color: white; border: none; border-radius: 50px; font-size: 22px; font-weight: 800; cursor: pointer; margin: 20px 0; box-shadow: 0 8px 20px rgba(163, 29, 36, 0.3); transition: 0.3s; }
        
        #formSection, #cancelSection { display: none; width: 100%; max-width: 900px; background: #fff; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); border: 1px solid #e2e8f0; overflow: hidden; animation: fadeIn 0.5s; margin-bottom: 50px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .header-img { width: 100%; height: auto; display: block; border-bottom: 4px solid var(--secondary); }
        .p-content { padding: 30px; }
        .section-bar { background: var(--primary); color: white; padding: 12px; border-radius: 8px; margin: 25px 0 15px 0; font-weight: 600; text-align: left; }
        
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; text-align: left; }
        .field { display: flex; flex-direction: column; margin-bottom: 10px; }
        label { font-size: 14px; font-weight: 700; color: #475569; margin-bottom: 5px; }
        input, select, textarea { padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 15px; }
        
        .btn-submit { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 20px; font-weight: 800; cursor: pointer; margin-top: 30px; }
        .btn-cancel-main { background: #64748b; color: white; border: none; padding: 12px 25px; border-radius: 30px; cursor: pointer; font-weight: bold; margin-bottom: 30px; transition: 0.3s; }
        .btn-cancel-submit { width: 100%; padding: 15px; background: var(--secondary); color: white; border: none; border-radius: 10px; margin-top: 20px; font-weight: bold; cursor: pointer; }
        
        .photo-area { grid-column: span 1; display: flex; flex-direction: column; align-items: center; background: #f1f5f9; padding: 15px; border-radius: 12px; border: 2px dashed #cbd5e1; }
        #preview { width: 110px; height: 130px; background: #fff; border: 1px solid #ddd; border-radius: 6px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; overflow: hidden; font-size: 12px; color: #94a3b8; }
        #preview img { width: 100%; height: 100%; object-fit: cover; }
        
        .span-2 { grid-column: span 2; } .span-3 { grid-column: span 3; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } .span-2, .span-3 { grid-column: span 1; } }
    </style>
</head>
<body>

    <div class="info-title">૧. એડમિશન માહિતી</div>
    <iframe src="Fees.pdf" class="pdf-box"></iframe>
    <div class="info-title">૨. VSGK માહિતી પત્રક</div>
    <iframe src="VSGK.pdf" class="pdf-box"></iframe>

    <button class="show-form-btn" onclick="toggleForm()">સ્કૂલ પ્રવેશ ફોર્મ ભરવા માટે અહીં ક્લિક કરો</button>

    <div id="formSection">
        <img src="header.jpeg" class="header-img">
        <div class="p-content">
            <h2 style="color:var(--secondary); text-align: center; margin-bottom: 25px;">શૈક્ષણિક પ્રવેશ ફોર્મ</h2>
            <form id="admissionForm">
                <input type="hidden" name="action" value="add">
                <div class="grid">
                    <div class="photo-area">
                        <div id="preview">વિદ્યાર્થી ફોટો</div>
                        <input type="file" accept="image/*" onchange="loadFile(event)" style="width:100%; font-size:10px;">
                    </div>
                    <div class="field span-2">
                        <label>વિદ્યાર્થીનું પૂરું નામ (અટક-નામ-પિતાનું નામ)</label>
                        <input type="text" name="studentName" placeholder="નામ લખો" required>
                    </div>
                </div>

                <div class="section-bar">૧. પ્રવેશ અને શૈક્ષણિક વિગત</div>
                <div class="grid">
                    <div class="field"><label>ધોરણ</label><input type="text" name="grade" required></div>
                    <div class="field"><label>લિંગ</label><select name="gender" required><option value="Male">કુમાર</option><option value="Female">કન્યા</option></select></div>
                    <div class="field"><label>જ્ઞાતિ</label><select name="caste"><option>Open</option><option>Baxi</option><option>SC</option><option>ST</option></select></div>
                    <div class="field"><label>પ્રકાર</label><select name="type"><option>Local</option><option>Up-Down</option></select></div>
                    
                    <div class="field">
                        <label>જન્મ તારીખ (DD-MM-YYYY)</label>
                        <input type="text" name="dob" placeholder="15-05-2015" pattern="\d{2}-\d{2}-\d{4}" title="તારીખ DD-MM-YYYY ફોર્મેટમાં લખો" required>
                    </div>

                    <div class="field span-2"><label>આધાર કાર્ડ નંબર</label><input type="text" name="aadhar" maxlength="12" pattern="\d{12}" placeholder="૧૨ આંકડાનો નંબર" required></div>
                </div>

                <div class="section-bar">૨. વાલીની વિગત</div>
                <div class="grid">
                    <div class="field span-2"><label>પિતાનું પૂરું નામ</label><input type="text" name="fatherName" required></div>
                    <div class="field"><label>મોબાઈલ નંબર</label><input type="tel" name="mobile" maxlength="10" pattern="[0-9]{10}" placeholder="૧૦ આંકડાનો મોબાઈલ" required></div>
                    <div class="field span-3"><label>સરનામું</label><textarea name="address" rows="3" placeholder="ગામ, તાલુકો, જિલ્લો"></textarea></div>
                </div>
                <button type="submit" id="submitBtn" class="btn-submit">સબમિટ કરો</button>
            </form>
        </div>
    </div>

    <div style="margin: 20px 0;">
        <button class="btn-cancel-main" onclick="toggleCancel()">એડમિશન કેન્સલ કરવા અહીં ક્લિક કરો</button>
    </div>

    <div id="cancelSection">
        <div class="p-content" style="background: #fff5f5;">
            <h3 style="color:var(--secondary); text-align: center;">એડમિશન કેન્સલ ફોર્મ</h3>
            <div class="grid" style="grid-template-columns: 1fr;">
                <div class="field"><label>મોબાઈલ નંબર</label><input type="tel" id="cancelMobile" maxlength="10"></div>
                <div class="field"><label>આધાર કાર્ડ નંબર</label><input type="text" id="cancelAadhar" maxlength="12"></div>
            </div>
            <button onclick="cancelAdmission()" id="cancelBtn" class="btn-cancel-submit">એડમિશન કેન્સલ કરો</button>
        </div>
    </div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwayrXM2fif05-jhxT4EczARK39dTmyflCIrouTP63WYYnAs6xZLQeFlj2nrRzazasn/exec';
    
    function toggleForm() { 
        document.getElementById('formSection').style.display = 'block'; 
        document.getElementById('cancelSection').style.display = 'none';
        document.getElementById('formSection').scrollIntoView({ behavior: 'smooth' });
    }
    
    function toggleCancel() { 
        document.getElementById('cancelSection').style.display = 'block'; 
        document.getElementById('formSection').style.display = 'none'; 
        document.getElementById('cancelSection').scrollIntoView({ behavior: 'smooth' });
    }
    
    function loadFile(e) { 
        if(e.target.files[0]) { 
            document.getElementById('preview').innerHTML = '<img src="' + URL.createObjectURL(e.target.files[0]) + '">'; 
        } 
    }

    // એડમિશન સબમિટ
    document.getElementById('admissionForm').addEventListener('submit', e => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true; 
        btn.innerHTML = "ફોર્મ સબમિટ થઈ રહ્યું છે...";
        
        fetch(scriptURL, { method: 'POST', body: new FormData(e.target)})
            .then(res => {
                alert('અભિનંદન! એડમિશન ફોર્મ સફળતાપૂર્વક સબમિટ થઈ ગયું છે.');
                location.reload();
            })
            .catch(err => { 
                alert('ભૂલ થઈ છે, ફરી પ્રયત્ન કરો.'); 
                btn.disabled = false; 
                btn.innerHTML = "સબમિટ કરો";
            });
    });

    // કેન્સલ ફંક્શન
    function cancelAdmission() {
        const mobile = document.getElementById('cancelMobile').value;
        const aadhar = document.getElementById('cancelAadhar').value;
        const btn = document.getElementById('cancelBtn');

        if (!mobile || !aadhar) { alert("મોબાઈલ અને આધાર નંબર લખવો જરૂરી છે."); return; }
        if (!confirm("શું તમે ખરેખર એડમિશન કેન્સલ કરવા માંગો છો?")) return;

        btn.disabled = true; btn.innerHTML = "ચકાસણી થઈ રહી છે...";

        const formData = new FormData();
        formData.append('action', 'cancel');
        formData.append('mobile', mobile);
        formData.append('aadhar', aadhar);

        fetch(scriptURL, { method: 'POST', body: formData })
            .then(res => res.text())
            .then(result => {
                if (result.includes("Successfully")) {
                    alert("એડમિશન કેન્સલ થઈ ગયું છે.");
                    location.reload();
                } else {
                    alert("માહિતી મળી નથી. કૃપા કરીને સાચો નંબર નાખો.");
                    btn.disabled = false; btn.innerHTML = "એડમિશન કેન્સલ કરો";
                }
            });
    }
</script>
</body>
</html>
